<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>EQUIPRIME INVENTORY PRO</title>
  <!-- Google Fonts & Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fefefe;
      color: #002a54;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Dashboard layout */
    .dashboard {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: row;
    }
    /* Sidebar with icons */
    .sidebar {
      width: 280px;
      background: #002a54;
      color: #fefefe;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar .title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .sidebar .title h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .sidebar .title p {
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .nav-item {
      padding: 0.7rem 1rem;
      margin: 0.2rem 0;
      cursor: pointer;
      transition: all 0.2s;
      color: #fefefe;
      font-weight: 500;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .nav-item i {
      width: 1.4rem;
      font-size: 1.1rem;
    }
    .nav-item:hover, .nav-item.active {
      background: #1e4a76;
    }
    .network-status {
      margin-top: auto;
      padding: 1rem 0.5rem;
      font-size: 0.75rem;
      text-align: center;
      border-top: 1px solid #3b6e9e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fefefe;
      overflow: auto;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #fefefe;
      border-bottom: 1px solid #acaa93;
      flex-shrink: 0;
    }
    .btn-sm {
      background: #acaa93;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      color: #002a54;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      margin-left: 0.75rem;
      transition: 0.2s;
    }
    .btn-sm i {
      margin-right: 0.3rem;
    }
    .btn-sm:hover {
      background: #8f8d74;
    }
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    /* Stats cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
    }
    .stat-card i {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      color: #002a54;
    }
    .stat-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #5a6e8a;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0.25rem 0;
    }
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-card, .alerts-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .form-card h3, .alerts-card h3 {
      margin-bottom: 1rem;
      font-size: 1rem;
      border-left: 3px solid #002a54;
      padding-left: 0.5rem;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .form-row label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    .form-row input, .form-row select {
      padding: 0.5rem;
      border: 1px solid #acaa93;
      border-radius: 0.5rem;
      background: #fefefe;
    }
    .btn-primary {
      background: #002a54;
      color: #fefefe;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      font-weight: 500;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #003d7a;
    }
    .alert-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .supplier-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .badge {
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .branch-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .branch-btn {
      background: #acaa93;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #002a54;
      transition: 0.2s;
    }
    .branch-active {
      background: #002a54;
      color: #fefefe;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .data-table th, .data-table td {
      border: 1px solid #acaa93;
      padding: 0.6rem;
      text-align: left;
      vertical-align: top;
    }
    .data-table th {
      background: #f5f3ea;
      font-weight: 600;
    }
    .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .login-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background:#002a54; display:flex; align-items:center; justify-content:center; z-index:2000;
    }
    .login-card {
      background: #fefefe; padding: 2rem; border-radius: 1rem; width: 340px; border: 1px solid #acaa93;
      text-align: center;
    }
    .login-card img {
      max-width: 100%;
      height: auto;
      margin-bottom: 1rem;
      border-radius: 0.5rem;
    }
    input, select {
      background: #fefefe; border: 1px solid #acaa93; padding: 0.5rem; border-radius: 0.5rem; width: 100%;
      margin-bottom: 0.5rem;
    }
    button { cursor: pointer; }
    .modal {
      position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000;
    }
    .modal-content {
      background: #fefefe; padding: 1.5rem; border-radius: 1rem; width: 500px; max-width: 90%;
    }
    .sub-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #acaa93;
    }
    .sub-tab-btn {
      background: none;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      color: #5a6e8a;
    }
    .sub-tab-btn.active {
      color: #002a54;
      border-bottom: 2px solid #002a54;
    }
    @media (max-width: 768px) {
      .dashboard { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
      .sidebar .title { display: none; }
      .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.3rem; }
      .nav-item { padding: 0.3rem 0.8rem; margin: 0; }
      .network-status { display: none; }
      .two-columns { grid-template-columns: 1fr; }
      .top-bar { justify-content: center; }
    }
  </style>
</head>
<body>
<div id="loginContainer" class="login-overlay">
  <div class="login-card">
    <img src="Inventory System Preview.png" alt="EQUIPRIME LOGO" onerror="this.style.display='none'">
    <i class="fas fa-microchip" style="font-size: 2rem; color:#002a54; margin-bottom:0.5rem;"></i>
    <h2>EQUIPRIME PRO</h2>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button id="loginBtn" class="btn-primary" style="margin-top:1rem;"><i class="fas fa-sign-in-alt"></i> Login</button>
    <button id="signupBtn" style="margin-top:0.5rem; width:100%; background:#acaa93; border:none; padding:0.5rem; border-radius:0.5rem; color:#002a54;"><i class="fas fa-user-plus"></i> Sign Up</button>
  </div>
</div>

<div id="appContainer" style="display:none; height:100vh; display:flex; flex-direction:column;">
<div class="dashboard">
  <div class="sidebar">
    <div class="title">
      <h1>EQUIPRIME</h1>
      <p>INVENTORY PRO</p>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="network-status">
      <span class="status-led"></span> <i class="fas fa-sync-alt"></i> WAREHOUSE SYNC LIVE
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <button id="quickReportBtn" class="btn-sm"><i class="fas fa-chart-line"></i> Quick Report</button>
      <button id="logoutBtn" class="btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="content-scroll" id="dynamicContent"></div>
  </div>
</div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCkoNkDgW9uDAZ6wcTHgzJ7__ik3NsmStc",
    authDomain: "eos-inventory.firebaseapp.com",
    projectId: "eos-inventory",
    storageBucket: "eos-inventory.firebasestorage.app",
    messagingSenderId: "659110549779",
    appId: "1:659110549779:web:0cf5632cfc3319e46da2e6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // Helper functions
  function showToast(msg, isError = false) {
    const toast = document.createElement("div");
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.background = isError ? "#b91c1c" : "#166534";
    toast.style.color = "white";
    toast.style.padding = "0.5rem 1rem";
    toast.style.borderRadius = "0.5rem";
    toast.style.zIndex = "9999";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.gap = "0.5rem";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function toDisplayDate(isoDate) {
    if (!isoDate) return "";
    let parts = isoDate.split("-");
    if (parts.length === 3) return `${parts[1]}/${parts[2]}/${parts[0]}`;
    return isoDate;
  }
  function toISODate(dateStr) {
    if (!dateStr) return "";
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
    let parts = dateStr.split(/[\/\-\.]/);
    if (parts.length === 3) {
      let year = parts[2], month = parts[0].padStart(2,'0'), day = parts[1].padStart(2,'0');
      if (year.length === 4 && month>=1 && month<=12 && day>=1 && day<=31) return `${year}-${month}-${day}`;
    }
    let d = new Date(dateStr);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0,10);
    return dateStr;
  }

  // Role‑based permissions
  const USER_TAB_PERMISSIONS = {
    "adminrom@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"],
    "admindex@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"],
    "GMCarlo@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "gmcarlo@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "adminkim@equiprime.ph": ["parts", "kpi", "movement"],
    "admin.andy@equiprime.ph": ["parts", "kpi", "movement", "dr_sales"],
    "warehouse@equiprime.ph": ["parts", "kpi", "movement"],
    "Sales.Machine@equiprime.ph": ["machines"],
    "sales.machine@equiprime.ph": ["machines"],
    "admincris@equiprime.ph": ["machines"]
  };
  const DEFAULT_VIEWS = ["parts"];
  const ALL_VIEWS = ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"];
  const VIEW_DISPLAY_NAMES = {
    parts: "Parts Inventory",
    machines: "Machines Log",
    suppliers: "Supplier Tracking",
    kpi: "KPI Reports",
    movement: "Slow/Fast Moving",
    uploads: "Parts Uploads",
    backup: "Backup / Restore",
    dr_sales: "Delivery Receipt & Sales Order",
    users: "User Management"
  };

  let currentUser = null, allowedViews = [];
  let allInventory=[], allMachines=[], allTransactions=[], allUploads=[], allDRRecords=[], allUsers=[];
  let unsubInv, unsubMach, unsubTx, unsubUp, unsubDR, unsubUsers;
  let currentBranch = "main", branchUnsub = null, currentView = "parts", currentDRSubTab = "north_luzon_pms", currentMonthFilter = new Date().toISOString().slice(0,7);

  // Login Enter key
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  loginEmail.addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });
  loginPassword.addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });

  document.getElementById("loginBtn").onclick = async () => {
    try { await auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value); }
    catch(e) { showToast("Login error: "+e.message, true); }
  };
  document.getElementById("signupBtn").onclick = async () => {
    try {
      const cred = await auth.createUserWithEmailAndPassword(loginEmail.value, loginPassword.value);
      await db.collection("users").doc(cred.user.uid).set({ email: loginEmail.value, approved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast("Sign-up successful! Wait for admin approval.");
    } catch(e) { showToast("Signup error: "+e.message, true); }
  };
  document.getElementById("logoutBtn").onclick = () => auth.signOut();

  auth.onAuthStateChanged(async user => {
    if(user) {
      currentUser = user;
      const email = user.email;
      const userDoc = await db.collection("users").doc(user.uid).get();
      const approved = userDoc.exists ? userDoc.data().approved : false;
      const isAdmin = email === "adminrom@equiprime.ph" || email === "admindex@equiprime.ph";
      if (!approved && !isAdmin) showToast("Pending approval – view only.");
      allowedViews = USER_TAB_PERMISSIONS[email] || DEFAULT_VIEWS;
      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display = "flex";
      buildNavigation();
      startGlobalListeners();
      if (allowedViews.length) loadView(allowedViews[0]);
      else showToast("No access. Contact admin.", true);
    } else {
      document.getElementById("loginContainer").style.display = "flex";
      document.getElementById("appContainer").style.display = "none";
      if(unsubInv) unsubInv(); if(unsubMach) unsubMach(); if(unsubTx) unsubTx(); if(unsubUp) unsubUp(); if(unsubDR) unsubDR(); if(unsubUsers) unsubUsers();
      if(branchUnsub) branchUnsub();
    }
  });

  function buildNavigation() {
    const navMenu = document.getElementById("navMenu");
    navMenu.innerHTML = "";
    for (const view of ALL_VIEWS) {
      if (allowedViews.includes(view)) {
        const navItem = document.createElement("div");
        navItem.className = "nav-item";
        if (view === currentView) navItem.classList.add("active");
        navItem.innerHTML = `<i class="fas ${getIconForView(view)}"></i> ${VIEW_DISPLAY_NAMES[view]}`;
        navItem.setAttribute("data-view", view);
        navItem.onclick = () => { loadView(view); document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active")); navItem.classList.add("active"); };
        navMenu.appendChild(navItem);
      }
    }
  }
  function getIconForView(view) {
    const icons = { parts:"fa-boxes", machines:"fa-tractor", suppliers:"fa-truck", kpi:"fa-chart-simple", movement:"fa-gauge-high", uploads:"fa-upload", backup:"fa-database", dr_sales:"fa-receipt", users:"fa-users" };
    return icons[view] || "fa-circle";
  }

  function startGlobalListeners() {
    unsubInv = db.collection("inventory").onSnapshot(snap => { allInventory = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="parts") renderPartsView(); if (currentView==="movement") renderMovementView(); updateDashboardStats(); });
    unsubMach = db.collection("machines").onSnapshot(snap => { allMachines = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="machines") renderMachinesView(); updateDashboardStats(); });
    unsubTx = db.collection("transactions").onSnapshot(snap => { allTransactions = snap.docs.map(d=>d.data()); if (currentView==="movement") renderMovementView(); if (currentView==="parts") renderPartsView(); });
    unsubUp = db.collection("uploads").onSnapshot(snap => { allUploads = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="uploads") renderUploadsView(); });
    unsubDR = db.collection("dr_sales_orders").onSnapshot(snap => { allDRRecords = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="dr_sales") renderDRView(); });
    if (allowedViews.includes("users")) unsubUsers = db.collection("users").onSnapshot(snap => { allUsers = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="users") renderUsersView(); });
  }

  function updateDashboardStats() {
    const totalUnits = allInventory.reduce((s,i)=>s+(i.qty||0),0);
    const lowStock = allInventory.filter(i=>i.qty<=i.threshold && i.qty>0).length;
    const totalValue = allInventory.reduce((s,i)=>s+(i.qty*(i.price||0)),0);
    const available = allMachines.filter(m=>m.status==="AVAILABLE").length;
    const efficiency = allMachines.length ? (available/allMachines.length)*100 : 100;
    const statDivs = document.querySelectorAll(".stat-value");
    if(statDivs.length) {
      statDivs[0].innerText = totalUnits;
      statDivs[1].innerText = lowStock;
      statDivs[2].innerHTML = `₱${totalValue.toLocaleString()}`;
      statDivs[3].innerText = `${Math.round(efficiency)}%`;
    }
  }

  function loadView(view) {
    currentView = view;
    if (view === "parts") renderPartsView();
    else if (view === "machines") renderMachinesView();
    else if (view === "suppliers") renderSuppliersView();
    else if (view === "kpi") renderKPIView();
    else if (view === "movement") renderMovementView();
    else if (view === "uploads") renderUploadsView();
    else if (view === "backup") renderBackupView();
    else if (view === "dr_sales") renderDRView();
    else if (view === "users") renderUsersView();
  }

  // ========== PARTS INVENTORY (full) ==========
  async function renderPartsView() {
    const container = document.getElementById("dynamicContent");
    container.innerHTML = `
      <div class="stats-row" id="partStats"></div>
      <div class="two-columns"><div class="form-card"><h3><i class="fas fa-plus-circle"></i> ADD ASSET ENTRY</h3><div class="form-row"><label>Part Number *</label><input id="newPartNo"></div><div class="form-row"><label>Part Name *</label><input id="newPartName"></div><div class="form-row"><label>Category</label><select id="newCategory"><option>Kobelco Parts</option><option>Shantui Parts</option><option>Sakai Parts</option><option>Trime Parts</option><option>Non-Core Products</option></select></div><div class="form-row"><label>Quantity</label><input id="newQty" type="number" value="0"></div><div class="form-row"><label>Price (₱)</label><input id="newPrice" type="number" step="0.01" value="0.00"></div><div class="form-row"><label>Low Stock Threshold</label><input id="newThreshold" type="number" value="5"></div><button id="addPartBtn" class="btn-primary"><i class="fas fa-save"></i> COMMIT ENTRY</button><div id="addError" style="color:#b91c1c;font-size:0.8rem;"></div></div>
        <div class="alerts-card"><h3><i class="fas fa-bell"></i> RESTOCK ALERT</h3><div id="restockAlertsContainer">Loading...</div><hr><h3><i class="fas fa-industry"></i> ACTIVE SUPPLIERS</h3><div class="supplier-item"><span><i class="fas fa-check-circle badge-green"></i> SHANTUI</span><span>Machines & Parts</span></div><div class="supplier-item"><span><i class="fas fa-check-circle badge-green"></i> SAKAI</span><span>Compaction Equipment</span></div><div class="supplier-item"><span><i class="fas fa-check-circle badge-green"></i> TRIME</span><span>Lighting Towers</span></div><div class="supplier-item"><span><i class="fas fa-check-circle badge-green"></i> BHI</span><span>Breakers & Attachments</span></div><div class="supplier-item"><span><i class="fas fa-check-circle badge-green"></i> KD HAMMERS</span><span>Hydraulic Hammers</span></div></div>
      </div>
      <div class="branch-tabs" id="branchTabs"></div>
      <div style="border:1px solid #acaa93; border-radius:0.75rem; padding:1rem; margin-top:1rem;"><h3><i class="fas fa-warehouse"></i> ASSET WAREHOUSE REGISTRY</h3><div id="branchInventoryPanel"></div></div>
    `;
    const monthDiv = document.createElement("div");
    monthDiv.innerHTML = `<label><i class="fas fa-calendar-alt"></i> Month: <input type="month" id="partMonthFilter" value="${currentMonthFilter}"></label> <button id="refreshPartStats" class="btn-sm"><i class="fas fa-sync-alt"></i> Refresh</button>`;
    document.getElementById("partStats").parentNode.insertBefore(monthDiv, document.getElementById("partStats"));
    document.getElementById("refreshPartStats").onclick = () => { currentMonthFilter = document.getElementById("partMonthFilter").value; updatePartStats(); };
    await updatePartStats();
    const branches = ["main","homonhon","coda","northluzon"];
    const branchNames = { main:"Main Warehouse", homonhon:"Homonhon", coda:"CODA", northluzon:"North Luzon" };
    document.getElementById("branchTabs").innerHTML = branches.map(b => `<div class="branch-btn ${b===currentBranch?'branch-active':''}" data-branch="${b}">${branchNames[b]}</div>`).join("");
    document.querySelectorAll(".branch-btn").forEach(btn => btn.onclick = () => { currentBranch = btn.dataset.branch; loadBranchInventory(); document.querySelectorAll(".branch-btn").forEach(b=>b.classList.remove("branch-active")); btn.classList.add("branch-active"); });
    await loadBranchInventory();
    renderRestockAlerts();
    document.getElementById("addPartBtn").onclick = addPartToBranch;
  }

  async function updatePartStats() {
    const start = new Date(currentMonthFilter+"-01"), end = new Date(start.getFullYear(), start.getMonth()+1, 0);
    let inT=0, outT=0;
    allTransactions.forEach(tx => { if(tx.timestamp && new Date(tx.timestamp)>=start && new Date(tx.timestamp)<=end) tx.type==="in"? inT+=tx.quantity : outT+=tx.quantity; });
    document.getElementById("partStats").innerHTML = `<div class="stat-card"><i class="fas fa-arrow-down"></i><div class="stat-title">MONTHLY IN</div><div class="stat-value">${inT}</div></div><div class="stat-card"><i class="fas fa-arrow-up"></i><div class="stat-title">MONTHLY OUT</div><div class="stat-value">${outT}</div></div><div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-title">MONTHLY NET</div><div class="stat-value">${inT-outT}</div></div>`;
  }
  function renderRestockAlerts() {
    const low = allInventory.filter(i=>i.qty<=i.threshold && i.qty>0).slice(0,5);
    document.getElementById("restockAlertsContainer").innerHTML = low.map(p=>`<div class="alert-item"><i class="fas fa-exclamation-triangle"></i> RESTOCK REMINDER: ${p.name} (${p.qty} left, min ${p.threshold})</div>`).join("") || "<div class='alert-item'><i class="fas fa-check-circle"></i> All stock levels normal</div>";
  }

  // ========== KPI REPORTS ==========
  function renderKPIView() {
    const container = document.getElementById("dynamicContent");
    container.innerHTML = `<div style="border:1px solid #acaa93; border-radius:1rem; padding:1rem;"><h3><i class="fas fa-chart-line"></i> KPI Reports</h3><div class="flex"><label>Period: <select id="kpiMonths"><option value="2">2 months</option><option value="3">3 months</option></select></label><button id="generateKpiBtn" class="btn-primary"><i class="fas fa-download"></i> Download CSV</button></div></div>`;
    document.getElementById("generateKpiBtn").onclick = () => {
      const months = parseInt(document.getElementById("kpiMonths").value);
      const start = new Date(); start.setMonth(start.getMonth()-months);
      let inT=0, outT=0;
      allTransactions.forEach(tx => { if(tx.timestamp && new Date(tx.timestamp)>=start) tx.type==="in"? inT+=tx.quantity : outT+=tx.quantity; });
      const csv = `Metric,Value\nTotal IN,${inT}\nTotal OUT,${outT}\nNet,${inT-outT}`;
      const blob = new Blob(["\uFEFF"+csv],{type:"text/csv"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`KPI_${months}months.csv`; a.click();
    };
  }
