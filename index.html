<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>EQUIPRIME INVENTORY PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fefefe;
      color: #002a54;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .dashboard {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: row;
    }
    .sidebar {
      width: 260px;
      background: #002a54;
      color: #fefefe;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar .title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .sidebar .title h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .sidebar .title p {
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .nav-item {
      padding: 0.7rem 1rem;
      margin: 0.2rem 0;
      cursor: pointer;
      transition: all 0.2s;
      color: #fefefe;
      font-weight: 500;
      border-radius: 0.5rem;
    }
    .nav-item:hover, .nav-item.active {
      background: #1e4a76;
    }
    .network-status {
      margin-top: auto;
      padding: 1rem 0.5rem;
      font-size: 0.75rem;
      text-align: center;
      border-top: 1px solid #3b6e9e;
    }
    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 6px;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fefefe;
      overflow: auto;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #fefefe;
      border-bottom: 1px solid #acaa93;
      flex-shrink: 0;
    }
    .btn-sm {
      background: #acaa93;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      color: #002a54;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      margin-left: 0.75rem;
    }
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
    }
    .stat-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #5a6e8a;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0.25rem 0;
    }
    .stat-sub {
      font-size: 0.7rem;
      color: #5a6e8a;
    }
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-card, .alerts-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .form-card h3, .alerts-card h3 {
      margin-bottom: 1rem;
      font-size: 1rem;
      border-left: 3px solid #002a54;
      padding-left: 0.5rem;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .form-row label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    .form-row input, .form-row select {
      padding: 0.5rem;
      border: 1px solid #acaa93;
      border-radius: 0.5rem;
      background: #fefefe;
      font-family: 'Poppins', sans-serif;
    }
    .btn-primary {
      background: #002a54;
      color: #fefefe;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      font-family: 'Poppins', sans-serif;
    }
    .alert-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
      font-size: 0.85rem;
    }
    .supplier-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
    }
    .supplier-name {
      font-weight: 600;
    }
    .reliability {
      font-size: 0.7rem;
      color: #5a6e8a;
    }
    .badge {
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .branch-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .branch-btn {
      background: #acaa93;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #002a54;
    }
    .branch-active {
      background: #002a54;
      color: #fefefe;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      overflow-x: auto;
      display: block;
    }
    .data-table thead, .data-table tbody {
      display: table;
      width: 100%;
    }
    .data-table th, .data-table td {
      padding: 0.6rem;
      text-align: left;
      border-bottom: 1px solid #acaa93;
      font-family: 'Poppins', sans-serif;
    }
    .data-table th {
      background: #f5f3ea;
      font-weight: 600;
    }
    .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .login-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background:#002a54; display:flex; align-items:center; justify-content:center; z-index:2000;
    }
    .login-card {
      background: #fefefe; padding: 2rem; border-radius: 1rem; width: 320px; border: 1px solid #acaa93;
    }
    input, select {
      background: #fefefe; border: 1px solid #acaa93; padding: 0.5rem; border-radius: 0.5rem; color: #002a54;
      font-family: 'Poppins', sans-serif;
    }
    button { cursor: pointer; }
    .modal {
      position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000;
    }
    .modal-content {
      background: #fefefe; padding: 1.5rem; border-radius: 1rem; width: 500px; max-width: 90%; border: 1px solid #acaa93;
    }
    .sub-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #acaa93;
    }
    .sub-tab-btn {
      background: none;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      color: #5a6e8a;
    }
    .sub-tab-btn.active {
      color: #002a54;
      border-bottom: 2px solid #002a54;
    }
    @media (max-width: 768px) {
      .dashboard { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
      .sidebar .title { display: none; }
      .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.3rem; }
      .nav-item { padding: 0.3rem 0.8rem; margin: 0; }
      .network-status { display: none; }
      .two-columns { grid-template-columns: 1fr; }
      .top-bar { justify-content: center; }
      .data-table th, .data-table td { white-space: nowrap; }
    }
  </style>
</head>
<body>
<div id="loginContainer" class="login-overlay">
  <div class="login-card">
    <h2>EQUIPRIME PRO</h2>
    <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom:0.5rem;"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button id="loginBtn" class="btn-primary" style="margin-top:1rem; width:100%;">Login</button>
    <button id="signupBtn" style="margin-top:0.5rem; width:100%; background:#acaa93; border:none; padding:0.5rem; border-radius:0.5rem; color:#002a54;">Sign Up</button>
  </div>
</div>

<div id="appContainer" style="display:none; height:100vh; display:flex; flex-direction:column;">
<div class="dashboard">
  <div class="sidebar">
    <div class="title">
      <h1>EQUIPRIME</h1>
      <p>INVENTORY PRO</p>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="network-status">
      <div><span class="status-led"></span> NETWORK STATUS: WAREHOUSE SYNC LIVE</div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <button id="quickReportBtn" class="btn-sm">Quick Report</button>
      <button id="logoutBtn" class="btn-sm">Logout</button>
    </div>
    <div class="content-scroll" id="dynamicContent"></div>
  </div>
</div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCkoNkDgW9uDAZ6wcTHgzJ7__ik3NsmStc",
    authDomain: "eos-inventory.firebaseapp.com",
    projectId: "eos-inventory",
    storageBucket: "eos-inventory.firebasestorage.app",
    messagingSenderId: "659110549779",
    appId: "1:659110549779:web:0cf5632cfc3319e46da2e6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // Helper functions
  function showToast(msg, isError = false) {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.background = isError ? "#b91c1c" : "#166534";
    toast.style.color = "white";
    toast.style.padding = "0.5rem 1rem";
    toast.style.borderRadius = "0.5rem";
    toast.style.zIndex = "9999";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========== ROLE-BASED ACCESS ==========
  const USER_TAB_PERMISSIONS = {
    "adminrom@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"],
    "admindex@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"],
    "GMCarlo@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "adminkim@equiprime.ph": ["parts", "kpi", "movement"],
    "admin.andy@equiprime.ph": ["parts", "kpi", "movement", "dr_sales"],
    "warehouse@equiprime.ph": ["parts", "kpi", "movement"],
    "Sales.Machine@equiprime.ph": ["machines"],
    "admincris@equiprime.ph": ["machines"]
  };
  const DEFAULT_VIEWS = ["parts"];
  const ALL_VIEWS = ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"];
  const VIEW_DISPLAY_NAMES = {
    parts: "Parts Inventory",
    machines: "Machines Log",
    suppliers: "Supplier Tracking",
    kpi: "KPI Reports",
    movement: "Slow/Fast Moving",
    uploads: "Parts Uploads",
    backup: "Backup / Restore",
    dr_sales: "Delivery Receipt & Sales Order",
    users: "User Management"
  };

  let currentUser = null;
  let allowedViews = [];
  let isApproved = false;
  let allInventory = [], allMachines = [], allTransactions = [], allUploads = [], allDRRecords = [], allUsers = [];
  let unsubInv, unsubMach, unsubTx, unsubUp, unsubDR, unsubUsers;
  let currentBranch = "main";
  let branchUnsub = null;
  let currentView = "parts";
  let currentDRSubTab = "north_luzon_pms";
  let currentMonthFilter = new Date().toISOString().slice(0,7); // YYYY-MM for filtering

  // Login with Enter key
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const handleLogin = () => document.getElementById("loginBtn").click();
  const handleSignup = () => document.getElementById("signupBtn").click();
  loginEmail.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
  loginPassword.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });

  document.getElementById("loginBtn").onclick = async () => {
    const email = loginEmail.value;
    const pwd = loginPassword.value;
    try {
      await auth.signInWithEmailAndPassword(email, pwd);
    } catch(e) { showToast("Login error: "+e.message, true); }
  };
  document.getElementById("signupBtn").onclick = async () => {
    const email = loginEmail.value;
    const pwd = loginPassword.value;
    try {
      const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
      await db.collection("users").doc(userCred.user.uid).set({
        email: email,
        approved: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast("Sign-up successful! Please wait for admin approval. You will have view-only access until then.");
    } catch(e) { showToast("Signup error: "+e.message, true); }
  };
  document.getElementById("logoutBtn").onclick = () => auth.signOut();

  auth.onAuthStateChanged(async user => {
    if(user) {
      currentUser = user;
      const email = user.email;
      const userDoc = await db.collection("users").doc(user.uid).get();
      const approved = userDoc.exists ? userDoc.data().approved : false;
      isApproved = approved;
      const isAdmin = email === "adminrom@equiprime.ph" || email === "admindex@equiprime.ph";
      if (!approved && !isAdmin) {
        showToast("Your account is pending approval. You can view data but cannot edit. Contact admin.");
      }
      allowedViews = USER_TAB_PERMISSIONS[email] || DEFAULT_VIEWS;
      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display = "flex";
      buildNavigation();
      startGlobalListeners();
      if (allowedViews.length > 0) {
        loadView(allowedViews[0]);
      } else {
        showToast("You have no access to any module. Contact admin.", true);
      }
    } else {
      document.getElementById("loginContainer").style.display = "flex";
      document.getElementById("appContainer").style.display = "none";
      if(unsubInv) unsubInv(); if(unsubMach) unsubMach(); if(unsubTx) unsubTx(); if(unsubUp) unsubUp(); if(unsubDR) unsubDR(); if(unsubUsers) unsubUsers();
      if(branchUnsub) branchUnsub();
    }
  });

  function buildNavigation() {
    const navMenu = document.getElementById("navMenu");
    navMenu.innerHTML = "";
    for (const view of ALL_VIEWS) {
      if (allowedViews.includes(view)) {
        const navItem = document.createElement("div");
        navItem.className = "nav-item";
        if (view === currentView) navItem.classList.add("active");
        navItem.textContent = VIEW_DISPLAY_NAMES[view];
        navItem.setAttribute("data-view", view);
        navItem.onclick = () => {
          loadView(view);
          document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
          navItem.classList.add("active");
        };
        navMenu.appendChild(navItem);
      }
    }
  }

  function startGlobalListeners() {
    unsubInv = db.collection("inventory").onSnapshot(snapshot => {
      allInventory = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "parts") renderPartsView();
      if (currentView === "movement") renderMovementView();
      updateDashboardStats();
    });
    unsubMach = db.collection("machines").onSnapshot(snapshot => {
      allMachines = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "machines") renderMachinesView();
      updateDashboardStats();
    });
    unsubTx = db.collection("transactions").onSnapshot(snapshot => {
      allTransactions = snapshot.docs.map(d => d.data());
      if (currentView === "movement") renderMovementView();
      if (currentView === "parts") renderPartsView(); // update IN/OUT summary
    });
    unsubUp = db.collection("uploads").onSnapshot(snapshot => {
      allUploads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "uploads") renderUploadsView();
    });
    unsubDR = db.collection("dr_sales_orders").onSnapshot(snapshot => {
      allDRRecords = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "dr_sales") renderDRView();
    });
    if (allowedViews.includes("users")) {
      unsubUsers = db.collection("users").onSnapshot(snapshot => {
        allUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        if (currentView === "users") renderUsersView();
      });
    }
  }

  function updateDashboardStats() {
    const totalUnits = allInventory.reduce((s,i)=>s + (i.qty||0),0);
    const lowStockCount = allInventory.filter(i => i.qty <= i.threshold && i.qty>0).length;
    const totalValue = allInventory.reduce((s,i)=>s + (i.qty * (i.price||0)),0);
    const availableMachines = allMachines.filter(m => m.status === "AVAILABLE").length;
    const totalMachines = allMachines.length;
    const efficiency = totalMachines ? (availableMachines/totalMachines)*100 : 100;
    const statDivs = document.querySelectorAll(".stat-value");
    if(statDivs.length) {
      statDivs[0].innerText = totalUnits;
      statDivs[1].innerText = lowStockCount;
      statDivs[2].innerHTML = `₱${totalValue.toLocaleString()}`;
      statDivs[3].innerText = `${Math.round(efficiency)}%`;
    }
  }

  function loadView(view) {
    currentView = view;
    if (view === "parts") renderPartsView();
    else if (view === "machines") renderMachinesView();
    else if (view === "suppliers") renderSuppliersView();
    else if (view === "kpi") renderKPIView();
    else if (view === "movement") renderMovementView();
    else if (view === "uploads") renderUploadsView();
    else if (view === "backup") renderBackupView();
    else if (view === "dr_sales") renderDRView();
    else if (view === "users") renderUsersView();
  }

  // ========== PARTS INVENTORY with Month Filter for IN/OUT Summary ==========
  async function renderPartsView() {
    const container = document.getElementById("dynamicContent");
    container.innerHTML = `
      <div class="stats-row" id="partStats"></div>
      <div class="two-columns">
        <div class="form-card">
          <h3>ADD ASSET ENTRY</h3>
          <div class="form-row"><label>Part Number *</label><input id="newPartNo" placeholder="Part Number"></div>
          <div class="form-row"><label>Part Name *</label><input id="newPartName" placeholder="Part Name"></div>
          <div class="form-row"><label>Category</label><select id="newCategory"><option>Kobelco Parts</option><option>Shantui Parts</option><option>Sakai Parts</option><option>Trime Parts</option><option>Non-Core Products</option></select></div>
          <div class="form-row"><label>Quantity</label><input id="newQty" type="number" value="0"></div>
          <div class="form-row"><label>Price (₱)</label><input id="newPrice" type="number" step="0.01" value="0.00"></div>
          <div class="form-row"><label>Low Stock Threshold</label><input id="newThreshold" type="number" value="5"></div>
          <button id="addPartBtn" class="btn-primary">COMMIT ENTRY</button>
          <div id="addError" style="color:#b91c1c; font-size:0.8rem; margin-top:0.5rem;"></div>
        </div>
        <div class="alerts-card">
          <h3>RESTOCK ALERT</h3>
          <div id="restockAlertsContainer">Loading...</div>
          <hr style="margin:1rem 0; border-color:#acaa93;">
          <h3>ACTIVE SUPPLIERS</h3>
          <div class="supplier-item"><span class="supplier-name">SHANTUI</span><div class="reliability">Machines & Parts</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">SAKAI</span><div class="reliability">Compaction Equipment</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">TRIME</span><div class="reliability">Lighting Towers</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">BHI</span><div class="reliability">Breakers & Attachments</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">KD HAMMERS</span><div class="reliability">Hydraulic Hammers</div><span class="badge badge-green">ACTIVE</span></div>
        </div>
      </div>
      <div class="branch-tabs" id="branchTabs"></div>
      <div style="background:#fefefe; border:1px solid #acaa93; border-radius:0.75rem; padding:1rem; margin-top:1rem;">
        <h3>ASSET WAREHOUSE REGISTRY</h3>
        <div id="branchInventoryPanel"></div>
      </div>
    `;
    // Update stats with month filter
    updatePartStats();
    const branches = ["main","homonhon","coda","northluzon"];
    const branchNames = { main:"Main Warehouse", homonhon:"Homonhon", coda:"CODA", northluzon:"North Luzon" };
    const tabsDiv = document.getElementById("branchTabs");
    tabsDiv.innerHTML = branches.map(b => `<div class="branch-btn ${b===currentBranch?'branch-active':''}" data-branch="${b}">${branchNames[b]}</div>`).join("");
    document.querySelectorAll(".branch-btn").forEach(btn => {
      btn.onclick = () => {
        currentBranch = btn.getAttribute("data-branch");
        loadBranchInventory();
        document.querySelectorAll(".branch-btn").forEach(b => b.classList.remove("branch-active"));
        btn.classList.add("branch-active");
      };
    });
    await loadBranchInventory();
    renderRestockAlerts();
    document.getElementById("addPartBtn").onclick = addPartToBranch;
    // Add month picker for stats
    const statsDiv = document.getElementById("partStats");
    const monthPicker = document.createElement("div");
    monthPicker.innerHTML = `<label>Month: <input type="month" id="partMonthFilter" value="${currentMonthFilter}"></label><button id="refreshPartStats" class="btn-sm">Refresh</button>`;
    statsDiv.parentNode.insertBefore(monthPicker, statsDiv);
    document.getElementById("refreshPartStats").onclick = () => {
      currentMonthFilter = document.getElementById("partMonthFilter").value;
      updatePartStats();
    };
    updatePartStats();
  }

  async function updatePartStats() {
    const startDate = new Date(currentMonthFilter + "-01");
    const endDate = new Date(startDate.getFullYear(), startDate.getMonth()+1, 0);
    let inTotal = 0, outTotal = 0;
    allTransactions.forEach(tx => {
      if(tx.timestamp && new Date(tx.timestamp) >= startDate && new Date(tx.timestamp) <= endDate) {
        if(tx.type === "in") inTotal += tx.quantity;
        else outTotal += tx.quantity;
      }
    });
    const net = inTotal - outTotal;
    const statsHtml = `
      <div class="stat-card"><div class="stat-title">MONTHLY IN</div><div class="stat-value">${inTotal}</div></div>
      <div class="stat-card"><div class="stat-title">MONTHLY OUT</div><div class="stat-value">${outTotal}</div></div>
      <div class="stat-card"><div class="stat-title">MONTHLY NET</div><div class="stat-value">${net}</div></div>
    `;
    const statsDiv = document.getElementById("partStats");
    if(statsDiv) statsDiv.innerHTML = statsHtml;
  }

    const container = document.getElementById("restockAlertsContainer");
    if(container) {
      container.innerHTML = lowStockParts.map(p => `<div class="alert-item">⚠️ RESTOCK REMINDER: ${p.name} (${p.qty} left, min ${p.threshold})</div>`).join("") || "<div class='alert-item'>✅ All stock levels normal</div>";
    }
  }

      if (confirm("⚠️ Delete ALL machines permanently?")) {
        db.collection("machines").get().then(snapshot => {
          const batch = db.batch();
          snapshot.forEach(doc => batch.delete(doc.ref));
          batch.commit().then(() => showToast("All machines deleted."));

    document.getElementById("exportMachineCsvBtn").onclick = () => exportMachineCSV();

  async function renderMachinesTable() {
    const month = currentMonthFilter;
    const startDate = month ? new Date(month + "-01") : null;
    const endDate = month ? new Date(new Date(month + "-01").getFullYear(), new Date(month + "-01").getMonth()+1, 0) : null;
    let filtered = allMachines;
    if (startDate && endDate) {
      filtered = allMachines.filter(m => {
        const arrDate = m.arrivalDate;
        if (!arrDate) return false;
        const ad = new Date(arrDate);
        return ad >= startDate && ad <= endDate;
      });
    }
    const tbody = document.getElementById("machinesTbody");
    if(!tbody) return;
    tbody.innerHTML = "";
    const today = new Date().toISOString().slice(0,10);
    filtered.forEach(m => {
      const arrivalDate = m.arrivalDate || "";
      let aging = "";
      if (arrivalDate) {
        const arrival = new Date(arrivalDate);
        const now = new Date();
        const diffTime = Math.abs(now - arrival);
        aging = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      }
      const row = tbody.insertRow();
      row.insertCell(0).innerText = m.brand || "";
      row.insertCell(1).innerText = m.model || "";
      row.insertCell(2).innerText = m.serialNumber || "";
      row.insertCell(3).innerText = m.engineNumber || "";
      row.insertCell(4).innerText = m.remarksCost || "";
      row.insertCell(5).innerText = m.location || "";
      row.insertCell(6).innerText = m.client || "";
      row.insertCell(7).innerText = m.remarks || "";
      row.insertCell(8).innerText = arrivalDate;
      row.insertCell(9).innerText = today;
      row.insertCell(10).innerText = aging;
      let statusText = m.status || "AVAILABLE";
      let statusBadge = statusText === "AVAILABLE" ? "<span class='badge badge-green'>AVAILABLE</span>" : (statusText === "RESERVED" ? "<span class='badge badge-orange'>RESERVED</span>" : (statusText === "INTENDED" ? "<span class='badge badge-orange'>INTENDED</span>" : "<span class='badge badge-red'>SOLD</span>"));
      row.insertCell(11).innerHTML = statusBadge;
      let actions = `<button class="editMachineBtn" data-id="${m.id}">✏️ Edit</button>`;
      if (allowedViews.includes("machines") && (currentUser.email === "adminrom@equiprime.ph" || currentUser.email === "admindex@equiprime.ph")) {
        actions += ` <button class="deleteMachine" data-id="${m.id}">🗑️ Delete</button>`;
      }
      row.insertCell(12).innerHTML = actions;
    });
    document.querySelectorAll(".editMachineBtn").forEach(btn => btn.onclick = () => openMachineModal(btn.dataset.id));
    if (allowedViews.includes("machines") && (currentUser.email === "adminrom@equiprime.ph" || currentUser.email === "admindex@equiprime.ph")) {
      document.querySelectorAll(".deleteMachine").forEach(btn => btn.onclick = () => { if(confirm("Delete machine?")) db.collection("machines").doc(btn.dataset.id).delete(); });
    }
  }

  function renderDRSubTab() {
    const container = document.getElementById("drContent");
    const records = allDRRecords.filter(r => r.type === currentDRSubTab);
    // Filter by month (using date field)
    const month = currentMonthFilter;
    const filtered = records.filter(r => {
      if (!r.date) return false;
      const recDate = new Date(r.date);
      const recYearMonth = `${recDate.getFullYear()}-${String(recDate.getMonth()+1).padStart(2,'0')}`;
      return recYearMonth === month;
    });
    container.innerHTML = `
      <div style="border:1px solid #acaa93; border-radius:0.75rem; padding:1rem;">
        <div class="flex" style="justify-content:space-between; margin-bottom:1rem;">
          <div class="flex">
            <label>Month: <input type="month" id="drMonthFilter" value="${currentMonthFilter}"></label>
            <button id="refreshDRList" class="btn-sm">Filter</button>
            <button id="addDRRecordBtn" class="btn-sm">➕ Add Record</button>
            <button id="deleteAllDRBtn" class="btn-sm" style="background:#fee2e2; color:#b91c1c;">Delete All</button>
          </div>
          <div>
            <input type="file" id="drCsvFile" accept=".csv" style="display:inline; width:auto;">
            <button id="importDRCsvBtn" class="btn-sm">Import CSV</button>
            <button id="exportDRCsvBtn" class="btn-sm">Export CSV</button>
          </div>
        </div>
        <div class="overflow-auto">
          <table class="data-table">
            <thead><th>Date</th><th>Customer</th><th>Brand</th><th>Model</th><th>Serial</th><th>Job Description</th><th>Details</th><th>DR-Released to</th><th>DR-Returned to</th><th>Remarks/Status</th><th>Completion Date</th><th>Actions</th></thead>
            <tbody id="drTbody"></tbody>
          </table>
        </div>
      </div>
    `;
    const tbody = document.getElementById("drTbody");
    tbody.innerHTML = "";
    filtered.forEach(record => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = record.date || "";
      row.insertCell(1).innerText = record.customer || "";
      row.insertCell(2).innerText = record.brand || "";
      row.insertCell(3).innerText = record.model || "";
      row.insertCell(4).innerText = record.serial || "";
      row.insertCell(5).innerText = record.jobDescription || "";
      row.insertCell(6).innerText = record.details || "";
      row.insertCell(7).innerText = record.drReleasedTo || "";
      row.insertCell(8).innerText = record.drReturnedTo || "";
      row.insertCell(9).innerText = record.remarks || "";
      row.insertCell(10).innerText = record.completionDate || "";
      let actions = `<button class="editDRRecord" data-id="${record.id}">✏️ Edit</button> <button class="deleteDRRecord" data-id="${record.id}">🗑️</button>`;
      row.insertCell(11).innerHTML = actions;
    });
    document.querySelectorAll(".deleteDRRecord").forEach(btn => btn.onclick = () => { if(confirm("Delete this record?")) db.collection("dr_sales_orders").doc(btn.dataset.id).delete(); });
    document.querySelectorAll(".editDRRecord").forEach(btn => btn.onclick = () => openDRModal(btn.dataset.id));
    document.getElementById("refreshDRList").onclick = () => {
      currentMonthFilter = document.getElementById("drMonthFilter").value;
      renderDRSubTab();
    };
    document.getElementById("addDRRecordBtn").onclick = () => openDRModal();
    document.getElementById("importDRCsvBtn").onclick = () => importDRCSV();
    document.getElementById("exportDRCsvBtn").onclick = () => exportDRCSV();
    document.getElementById("deleteAllDRBtn").onclick = () => {
      if(confirm(`⚠️ Delete ALL records in this month for ${currentDRSubTab === 'north_luzon_pms' ? 'North Luzon PMS' : 'Monitoring of DR'}?`)) {
        const batch = db.batch();
        filtered.forEach(rec => batch.delete(db.collection("dr_sales_orders").doc(rec.id)));
        batch.commit().then(() => showToast("All filtered records deleted."));
      }
    };
  }
