<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>EQUIPRIME INVENTORY PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fefefe;
      color: #002a54;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .dashboard {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: row;
    }
    .sidebar {
      width: 260px;
      background: #002a54;
      color: #fefefe;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar .title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .sidebar .title h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .sidebar .title p {
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .nav-item {
      padding: 0.7rem 1rem;
      margin: 0.2rem 0;
      cursor: pointer;
      transition: all 0.2s;
      color: #fefefe;
      font-weight: 500;
      border-radius: 0.5rem;
    }
    .nav-item:hover, .nav-item.active {
      background: #1e4a76;
    }
    .network-status {
      margin-top: auto;
      padding: 1rem 0.5rem;
      font-size: 0.75rem;
      text-align: center;
      border-top: 1px solid #3b6e9e;
    }
    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 6px;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fefefe;
      overflow: auto;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #fefefe;
      border-bottom: 1px solid #acaa93;
      flex-shrink: 0;
    }
    .btn-sm {
      background: #acaa93;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      color: #002a54;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      margin-left: 0.75rem;
    }
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
    }
    .stat-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #5a6e8a;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0.25rem 0;
    }
    .stat-sub {
      font-size: 0.7rem;
      color: #5a6e8a;
    }
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-card, .alerts-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .form-card h3, .alerts-card h3 {
      margin-bottom: 1rem;
      font-size: 1rem;
      border-left: 3px solid #002a54;
      padding-left: 0.5rem;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .form-row label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    .form-row input, .form-row select {
      padding: 0.5rem;
      border: 1px solid #acaa93;
      border-radius: 0.5rem;
      background: #fefefe;
      font-family: 'Poppins', sans-serif;
    }
    .btn-primary {
      background: #002a54;
      color: #fefefe;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      font-family: 'Poppins', sans-serif;
    }
    .alert-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
      font-size: 0.85rem;
    }
    .supplier-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
    }
    .supplier-name {
      font-weight: 600;
    }
    .reliability {
      font-size: 0.7rem;
      color: #5a6e8a;
    }
    .badge {
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .branch-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .branch-btn {
      background: #acaa93;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #002a54;
    }
    .branch-active {
      background: #002a54;
      color: #fefefe;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .data-table th, .data-table td {
      border: 1px solid #acaa93;
      padding: 0.6rem;
      text-align: left;
      font-family: 'Poppins', sans-serif;
      vertical-align: top;
      background: #fefefe;
      color: #002a54;
    }
    .data-table th {
      background: #f5f3ea;
      font-weight: 600;
    }
    .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .login-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background:#002a54; display:flex; align-items:center; justify-content:center; z-index:2000;
    }
    .login-card {
      background: #fefefe; padding: 2rem; border-radius: 1rem; width: 320px; border: 1px solid #acaa93;
      text-align: center;
    }
    .login-card img {
      max-width: 100%;
      height: auto;
      margin-bottom: 1rem;
      border-radius: 0.5rem;
    }
    input, select {
      background: #fefefe; border: 1px solid #acaa93; padding: 0.5rem; border-radius: 0.5rem; color: #002a54;
      font-family: 'Poppins', sans-serif;
      width: 100%;
      margin-bottom: 0.5rem;
    }
    button { cursor: pointer; }
    .modal {
      position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000;
    }
    .modal-content {
      background: #fefefe; padding: 1.5rem; border-radius: 1rem; width: 500px; max-width: 90%; border: 1px solid #acaa93;
    }
    .sub-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #acaa93;
    }
    .sub-tab-btn {
      background: none;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      color: #5a6e8a;
    }
    .sub-tab-btn.active {
      color: #002a54;
      border-bottom: 2px solid #002a54;
    }
    @media (max-width: 768px) {
      .dashboard { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 0.5rem; gap: 0.5rem; justify-content: center; }
      .sidebar .title { display: none; }
      .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.3rem; }
      .nav-item { padding: 0.3rem 0.8rem; margin: 0; }
      .network-status { display: none; }
      .two-columns { grid-template-columns: 1fr; }
      .top-bar { justify-content: center; }
    }
  </style>
</head>
<body>
<div id="loginContainer" class="login-overlay">
  <div class="login-card">
    <img src="Inventory System Preview.png" alt="EQUIPRIME LOGO" onerror="this.style.display='none'">
    <h2>EQUIPRIME PRO</h2>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button id="loginBtn" class="btn-primary" style="margin-top:1rem; width:100%;">Login</button>
    <button id="signupBtn" style="margin-top:0.5rem; width:100%; background:#acaa93; border:none; padding:0.5rem; border-radius:0.5rem; color:#002a54;">Sign Up</button>
  </div>
</div>

<div id="appContainer" style="display:none; height:100vh; display:flex; flex-direction:column;">
<div class="dashboard">
  <div class="sidebar">
    <div class="title">
      <h1>EQUIPRIME</h1>
      <p>INVENTORY PRO</p>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="network-status">
      <div><span class="status-led"></span> NETWORK STATUS: WAREHOUSE SYNC LIVE</div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <button id="quickReportBtn" class="btn-sm">Quick Report</button>
      <button id="logoutBtn" class="btn-sm">Logout</button>
    </div>
    <div class="content-scroll" id="dynamicContent"></div>
  </div>
</div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCkoNkDgW9uDAZ6wcTHgzJ7__ik3NsmStc",
    authDomain: "eos-inventory.firebaseapp.com",
    projectId: "eos-inventory",
    storageBucket: "eos-inventory.firebasestorage.app",
    messagingSenderId: "659110549779",
    appId: "1:659110549779:web:0cf5632cfc3319e46da2e6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  function showToast(msg, isError = false) {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.background = isError ? "#b91c1c" : "#166534";
    toast.style.color = "white";
    toast.style.padding = "0.5rem 1rem";
    toast.style.borderRadius = "0.5rem";
    toast.style.zIndex = "9999";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function toDisplayDate(isoDate) {
    if (!isoDate) return "";
    const parts = isoDate.split("-");
    if (parts.length === 3) return `${parts[1]}/${parts[2]}/${parts[0]}`;
    return isoDate;
  }
  function toISODate(dateStr) {
    if (!dateStr) return "";
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
    const parts = dateStr.split(/[\/\-\.]/);
    if (parts.length === 3) {
      let year = parts[2], month = parts[0].padStart(2,'0'), day = parts[1].padStart(2,'0');
      if (year.length === 4 && month>=1 && month<=12 && day>=1 && day<=31) return `${year}-${month}-${day}`;
    }
    const d = new Date(dateStr);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0,10);
    return dateStr;
  }

  const USER_TAB_PERMISSIONS = {
    "adminrom@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"],
    "admindex@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"],
    "GMCarlo@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "gmcarlo@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "adminkim@equiprime.ph": ["parts", "kpi", "movement"],
    "admin.andy@equiprime.ph": ["parts", "kpi", "movement", "dr_sales"],
    "warehouse@equiprime.ph": ["parts", "kpi", "movement"],
    "Sales.Machine@equiprime.ph": ["machines"],
    "sales.machine@equiprime.ph": ["machines"],
    "admincris@equiprime.ph": ["machines"]
  };
  const DEFAULT_VIEWS = ["parts"];
  const ALL_VIEWS = ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales", "users"];
  const VIEW_DISPLAY_NAMES = {
    parts: "Parts Inventory",
    machines: "Machines Log",
    suppliers: "Supplier Tracking",
    kpi: "KPI Reports",
    movement: "Slow/Fast Moving",
    uploads: "Parts Uploads",
    backup: "Backup / Restore",
    dr_sales: "Delivery Receipt & Sales Order",
    users: "User Management"
  };

  let currentUser = null, allowedViews = [];
  let allInventory=[], allMachines=[], allTransactions=[], allUploads=[], allDRRecords=[], allUsers=[];
  let unsubInv, unsubMach, unsubTx, unsubUp, unsubDR, unsubUsers;
  let currentBranch = "main", branchUnsub = null, currentView = "parts", currentDRSubTab = "north_luzon_pms", currentMonthFilter = new Date().toISOString().slice(0,7);

  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  loginEmail.addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });
  loginPassword.addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });

  document.getElementById("loginBtn").onclick = async () => {
    try { await auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value); }
    catch(e) { showToast("Login error: "+e.message, true); }
  };
  document.getElementById("signupBtn").onclick = async () => {
    try {
      const cred = await auth.createUserWithEmailAndPassword(loginEmail.value, loginPassword.value);
      await db.collection("users").doc(cred.user.uid).set({ email: loginEmail.value, approved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast("Sign-up successful! Wait for admin approval.");
    } catch(e) { showToast("Signup error: "+e.message, true); }
  };
  document.getElementById("logoutBtn").onclick = () => auth.signOut();

  auth.onAuthStateChanged(async user => {
    if(user) {
      currentUser = user;
      const email = user.email;
      const userDoc = await db.collection("users").doc(user.uid).get();
      const approved = userDoc.exists ? userDoc.data().approved : false;
      const isAdmin = email === "adminrom@equiprime.ph" || email === "admindex@equiprime.ph";
      if (!approved && !isAdmin) showToast("Pending approval – view only.");
      allowedViews = USER_TAB_PERMISSIONS[email] || DEFAULT_VIEWS;
      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display = "flex";
      buildNavigation();
      startGlobalListeners();
      if (allowedViews.length) loadView(allowedViews[0]);
      else showToast("No access. Contact admin.", true);
    } else {
      document.getElementById("loginContainer").style.display = "flex";
      document.getElementById("appContainer").style.display = "none";
      if(unsubInv) unsubInv(); if(unsubMach) unsubMach(); if(unsubTx) unsubTx(); if(unsubUp) unsubUp(); if(unsubDR) unsubDR(); if(unsubUsers) unsubUsers();
      if(branchUnsub) branchUnsub();
    }
  });

  function buildNavigation() {
    const navMenu = document.getElementById("navMenu");
    navMenu.innerHTML = "";
    for (const view of ALL_VIEWS) {
      if (allowedViews.includes(view)) {
        const navItem = document.createElement("div");
        navItem.className = "nav-item";
        if (view === currentView) navItem.classList.add("active");
        navItem.textContent = VIEW_DISPLAY_NAMES[view];
        navItem.setAttribute("data-view", view);
        navItem.onclick = () => { loadView(view); document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active")); navItem.classList.add("active"); };
        navMenu.appendChild(navItem);
      }
    }
  }

  function startGlobalListeners() {
    unsubInv = db.collection("inventory").onSnapshot(snap => { allInventory = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="parts") renderPartsView(); if (currentView==="movement") renderMovementView(); updateDashboardStats(); });
    unsubMach = db.collection("machines").onSnapshot(snap => { allMachines = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="machines") renderMachinesView(); updateDashboardStats(); });
    unsubTx = db.collection("transactions").onSnapshot(snap => { allTransactions = snap.docs.map(d=>d.data()); if (currentView==="movement") renderMovementView(); if (currentView==="parts") renderPartsView(); });
    unsubUp = db.collection("uploads").onSnapshot(snap => { allUploads = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="uploads") renderUploadsView(); });
    unsubDR = db.collection("dr_sales_orders").onSnapshot(snap => { allDRRecords = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="dr_sales") renderDRView(); });
    if (allowedViews.includes("users")) unsubUsers = db.collection("users").onSnapshot(snap => { allUsers = snap.docs.map(d=>({id:d.id,...d.data()})); if (currentView==="users") renderUsersView(); });
  }

  function updateDashboardStats() {
    const totalUnits = allInventory.reduce((s,i)=>s+(i.qty||0),0);
    const lowStock = allInventory.filter(i=>i.qty<=i.threshold && i.qty>0).length;
    const totalValue = allInventory.reduce((s,i)=>s+(i.qty*(i.price||0)),0);
    const available = allMachines.filter(m=>m.status==="AVAILABLE").length;
    const efficiency = allMachines.length ? (available/allMachines.length)*100 : 100;
    const statDivs = document.querySelectorAll(".stat-value");
    if(statDivs.length) {
      statDivs[0].innerText = totalUnits;
      statDivs[1].innerText = lowStock;
      statDivs[2].innerHTML = `₱${totalValue.toLocaleString()}`;
      statDivs[3].innerText = `${Math.round(efficiency)}%`;
    }
  }

  function loadView(view) {
    currentView = view;
    if (view === "parts") renderPartsView();
    else if (view === "machines") renderMachinesView();
    else if (view === "suppliers") renderSuppliersView();
    else if (view === "kpi") renderKPIView();
    else if (view === "movement") renderMovementView();
    else if (view === "uploads") renderUploadsView();
    else if (view === "backup") renderBackupView();
    else if (view === "dr_sales") renderDRView();
    else if (view === "users") renderUsersView();
  }

  // ========== PARTS INVENTORY ==========
  async function renderPartsView() {
    const container = document.getElementById("dynamicContent");
    container.innerHTML = `
      <div class="stats-row" id="partStats"></div>
      <div class="two-columns"><div class="form-card"><h3>ADD ASSET ENTRY</h3><div class="form-row"><label>Part Number *</label><input id="newPartNo"></div><div class="form-row"><label>Part Name *</label><input id="newPartName"></div><div class="form-row"><label>Category</label><select id="newCategory"><option>Kobelco Parts</option><option>Shantui Parts</option><option>Sakai Parts</option><option>Trime Parts</option><option>Non-Core Products</option></select></div><div class="form-row"><label>Quantity</label><input id="newQty" type="number" value="0"></div><div class="form-row"><label>Price (₱)</label><input id="newPrice" type="number" step="0.01" value="0.00"></div><div class="form-row"><label>Low Stock Threshold</label><input id="newThreshold" type="number" value="5"></div><button id="addPartBtn" class="btn-primary">COMMIT ENTRY</button><div id="addError" style="color:#b91c1c;font-size:0.8rem;"></div></div>
        <div class="alerts-card"><h3>RESTOCK ALERT</h3><div id="restockAlertsContainer">Loading...</div><hr><h3>ACTIVE SUPPLIERS</h3><div class="supplier-item"><span class="supplier-name">SHANTUI</span><div class="reliability">Machines & Parts</div><span class="badge badge-green">ACTIVE</span></div><div class="supplier-item"><span class="supplier-name">SAKAI</span><div class="reliability">Compaction Equipment</div><span class="badge badge-green">ACTIVE</span></div><div class="supplier-item"><span class="supplier-name">TRIME</span><div class="reliability">Lighting Towers</div><span class="badge badge-green">ACTIVE</span></div><div class="supplier-item"><span class="supplier-name">BHI</span><div class="reliability">Breakers & Attachments</div><span class="badge badge-green">ACTIVE</span></div><div class="supplier-item"><span class="supplier-name">KD HAMMERS</span><div class="reliability">Hydraulic Hammers</div><span class="badge badge-green">ACTIVE</span></div></div>
      </div>
      <div class="branch-tabs" id="branchTabs"></div>
      <div style="border:1px solid #acaa93; border-radius:0.75rem; padding:1rem; margin-top:1rem;"><h3>ASSET WAREHOUSE REGISTRY</h3><div id="branchInventoryPanel"></div></div>
    `;
    const monthDiv = document.createElement("div");
    monthDiv.innerHTML = `<label>Month: <input type="month" id="partMonthFilter" value="${currentMonthFilter}"></label><button id="refreshPartStats" class="btn-sm">Refresh</button>`;
    document.getElementById("partStats").parentNode.insertBefore(monthDiv, document.getElementById("partStats"));
    document.getElementById("refreshPartStats").onclick = () => { currentMonthFilter = document.getElementById("partMonthFilter").value; updatePartStats(); };
    await updatePartStats();
    const branches = ["main","homonhon","coda","northluzon"];
    const branchNames = { main:"Main Warehouse", homonhon:"Homonhon", coda:"CODA", northluzon:"North Luzon" };
    document.getElementById("branchTabs").innerHTML = branches.map(b => `<div class="branch-btn ${b===currentBranch?'branch-active':''}" data-branch="${b}">${branchNames[b]}</div>`).join("");
    document.querySelectorAll(".branch-btn").forEach(btn => btn.onclick = () => { currentBranch = btn.dataset.branch; loadBranchInventory(); document.querySelectorAll(".branch-btn").forEach(b=>b.classList.remove("branch-active")); btn.classList.add("branch-active"); });
    await loadBranchInventory();
    renderRestockAlerts();
    document.getElementById("addPartBtn").onclick = addPartToBranch;
  }
  async function updatePartStats() {
    const start = new Date(currentMonthFilter+"-01"), end = new Date(start.getFullYear(), start.getMonth()+1, 0);
    let inT=0, outT=0;
    allTransactions.forEach(tx => { if(tx.timestamp && new Date(tx.timestamp)>=start && new Date(tx.timestamp)<=end) tx.type==="in"? inT+=tx.quantity : outT+=tx.quantity; });

  async function modifyQty(id, delta) {
    const doc = await db.collection("inventory").doc(id).get();
    if(!doc.exists) return;
    let newQty = doc.data().qty + delta;
    if(newQty<0) newQty=0;
    const change = newQty - doc.data().qty;
    if(change===0) return;
    await db.collection("inventory").doc(id).update({ qty: newQty });
    await db.collection("transactions").add({ productId:id, partNo:doc.data().partNo, productName:doc.data().name, branch:currentBranch, type:change>0?"in":"out", quantity:Math.abs(change), timestamp:firebase.firestore.FieldValue.serverTimestamp() });
  }

    const qty = parseInt(document.getElementById("newQty").value)||0, price = parseFloat(document.getElementById("newPrice").value)||0, threshold = parseInt(document.getElementById("newThreshold").value)||5;
    await db.collection("inventory").add({ partNo, name, branch:currentBranch, qty, price, threshold });
    if(qty>0) await db.collection("transactions").add({ productId:"new", partNo, productName:name, branch:currentBranch, type:"in", quantity:qty, timestamp:firebase.firestore.FieldValue.serverTimestamp() });
    document.getElementById("newPartNo").value=""; document.getElementById("newPartName").value=""; document.getElementById("addError").innerText="";

  async function importCSVToBranch(branch) {
    const file = document.getElementById("csvImportFile").files[0];
    if(!file) return alert("Select CSV");
    const overwrite = document.getElementById("overwriteCheckbox").checked;
    if(overwrite && confirm("Clear all parts in this branch?")) {
      const snap = await db.collection("inventory").where("branch","==",branch).get();
      const batch = db.batch(); snap.forEach(doc=>batch.delete(doc.ref)); await batch.commit();
    }
    const reader = new FileReader();
    reader.onload = async(e) => {
      const lines = e.target.result.split(/\r?\n/);
      const headers = lines[0].split(",").map(h=>h.trim().toLowerCase());
      const idx = { partNumber: headers.indexOf("partnumber"), partName: headers.indexOf("partname"), category: headers.indexOf("category"), quantity: headers.indexOf("quantity"), price: headers.indexOf("price"), threshold: headers.indexOf("threshold") };
      let success=0,fail=0;
      for(let i=1;i<lines.length;i++) {
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(",").map(c=>c.trim().replace(/^"|"$/g,''));
        const partNo = cols[idx.partNumber], name = cols[idx.partName];
        if(!partNo || !name) { fail++; continue; }
        const category = (idx.category>=0 && cols[idx.category]) ? cols[idx.category] : "Non-Core Products";
        let qty = parseInt((idx.quantity>=0 ? cols[idx.quantity] : 0)) || 0;
        let price = parseFloat((idx.price>=0 ? cols[idx.price] : 0)) || 0;
        let threshold = parseInt((idx.threshold>=0 ? cols[idx.threshold] : 5)) || 5;
        await db.collection("inventory").add({ partNo, name, category, branch, qty, price, threshold });
        success++;
      }
      alert(`Imported ${success} parts, ${fail} failed.`);
      loadBranchInventory();
    };
    reader.readAsText(file);
  }

  function updateFastMovingAndMovement() {

        btn.onclick = async () => { await db.collection("users").doc(u.id).update({approved:true}); showToast(`User ${u.email} approved.`); };
        row.insertCell(2).appendChild(btn);
      } else row.insertCell(2).innerText = "—";
    });
  }

  // ========== DELIVERY RECEIPT & SALES ORDER ==========
  function renderDRView() {
    const container = document.getElementById("dynamicContent");
    container.innerHTML = `<div class="sub-tabs"><button class="sub-tab-btn ${currentDRSubTab==='north_luzon_pms'?'active':''}" data-subtab="north_luzon_pms">North Luzon PMS</button><button class="sub-tab-btn ${currentDRSubTab==='monitoring_dr'?'active':''}" data-subtab="monitoring_dr">Monitoring of DR</button></div><div id="drContent"></div>`;
    document.querySelectorAll(".sub-tab-btn").forEach(btn=>btn.onclick=()=>{ currentDRSubTab=btn.dataset.subtab; renderDRSubTab(); document.querySelectorAll(".sub-tab-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); });
    renderDRSubTab();
  }
  function renderDRSubTab() {
    const records = allDRRecords.filter(r=>r.type===currentDRSubTab);
    const sorted = [...records].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    const filtered = sorted.filter(r=>{ if(!r.date) return false; let dp = r.date.slice(0,7); return dp === currentMonthFilter; });
    const container = document.getElementById("drContent");
    container.innerHTML = `<div style="border:1px solid #acaa93; border-radius:0.75rem; padding:1rem;"><div class="flex" style="justify-content:space-between; margin-bottom:1rem;"><div class="flex"><label>Month: <input type="month" id="drMonthFilter" value="${currentMonthFilter}"></label><button id="refreshDRList" class="btn-sm">Filter</button><button id="addDRRecordBtn" class="btn-sm">➕ Add Record</button><button id="deleteAllDRBtn" class="btn-sm" style="background:#fee2e2;color:#b91c1c;">Delete All (This Month)</button></div><div><input type="file" id="drCsvFile" accept=".csv"><button id="importDRCsvBtn" class="btn-sm">Import CSV</button><button id="exportDRCsvBtn" class="btn-sm">Export CSV</button></div></div><div class="overflow-auto"><table class="data-table"><thead><th>DATE</th><th>CUSTOMER</th><th>BRAND</th><th>MODEL</th><th>SERIAL</th><th>JOB DESCRIPTION</th><th>DETAILS</th><th>DR-RELEASED TO</th><th>DR-RETURN TO</th><th>REMARKS</th><th>COMPLETION DATE</th><th>Actions</th></thead><tbody id="drTbody"></tbody></table></div><div id="debugMsg" style="margin-top:1rem; font-size:0.8rem; color:#b91c1c;"></div></div>`;
    const tbody = document.getElementById("drTbody");
    tbody.innerHTML = "";
    if(filtered.length === 0) document.getElementById("debugMsg").innerText = `No records for ${currentMonthFilter}. Total: ${records.length}. Check date format.`;
    else document.getElementById("debugMsg").innerText = `Showing ${filtered.length} records.`;
    filtered.forEach(rec => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = toDisplayDate(rec.date);
      row.insertCell(1).innerText = rec.customer||""; row.insertCell(2).innerText = rec.brand||""; row.insertCell(3).innerText = rec.model||""; row.insertCell(4).innerText = rec.serial||"";
      row.insertCell(5).innerText = rec.jobDescription||""; row.insertCell(6).innerText = rec.details||""; row.insertCell(7).innerText = rec.drReleasedTo||""; row.insertCell(8).innerText = rec.drReturnedTo||"";
      row.insertCell(9).innerText = rec.remarks||""; row.insertCell(10).innerText = toDisplayDate(rec.completionDate);
      let actions = `<button class="editDRRecord" data-id="${rec.id}">✏️</button> <button class="deleteDRRecord" data-id="${rec.id}">🗑️</button>`;
      row.insertCell(11).innerHTML = actions;
    });
    document.querySelectorAll(".deleteDRRecord").forEach(btn=>btn.onclick=()=>{if(confirm("Delete?")) db.collection("dr_sales_orders").doc(btn.dataset.id).delete();});
    document.querySelectorAll(".editDRRecord").forEach(btn=>btn.onclick=()=>openDRModal(btn.dataset.id));
    document.getElementById("refreshDRList").onclick = () => { currentMonthFilter = document.getElementById("drMonthFilter").value; renderDRSubTab(); };
    document.getElementById("addDRRecordBtn").onclick = () => openDRModal();
    document.getElementById("importDRCsvBtn").onclick = () => importDRCSV();
    document.getElementById("exportDRCsvBtn").onclick = () => exportDRCSV();
    document.getElementById("deleteAllDRBtn").onclick = () => {
      if(confirm(`Delete ALL records for ${currentMonthFilter}?`)) { const batch = db.batch(); filtered.forEach(rec => batch.delete(db.collection("dr_sales_orders").doc(rec.id))); batch.commit().then(()=>showToast("Deleted.")); }
    };
  }
  function openDRModal(record=null) {
    const modal = document.createElement("div"); modal.className = "modal";
    modal.innerHTML = `<div class="modal-content"><h3>${record?'Edit':'Add'} Record</h3>
      <div class="form-row"><label>Date (YYYY-MM-DD)</label><input type="date" id="drDate" value="${record?.date||''}"></div>
      <div class="form-row"><label>Customer</label><input id="drCustomer" value="${record?.customer||''}"></div>
      <div class="form-row"><label>Brand</label><input id="drBrand" value="${record?.brand||''}"></div>
      <div class="form-row"><label>Model</label><input id="drModel" value="${record?.model||''}"></div>
      <div class="form-row"><label>Serial</label><input id="drSerial" value="${record?.serial||''}"></div>
      <div class="form-row"><label>Job Description</label><input id="drJobDesc" value="${record?.jobDescription||''}"></div>
      <div class="form-row"><label>Details</label><input id="drDetails" value="${record?.details||''}"></div>
      <div class="form-row"><label>DR-Released to</label><input id="drReleasedTo" value="${record?.drReleasedTo||''}"></div>
      <div class="form-row"><label>DR-Return to</label><input id="drReturnedTo" value="${record?.drReturnedTo||''}"></div>
      <div class="form-row"><label>Remarks/Status</label><input id="drRemarks" value="${record?.remarks||''}"></div>
      <div class="form-row"><label>Completion Date (YYYY-MM-DD)</label><input type="date" id="drCompletionDate" value="${record?.completionDate||''}"></div>
      <div class="flex"><button id="saveDRBtn" class="btn-primary">Save</button><button id="cancelDRBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById("cancelDRBtn").onclick = () => modal.remove();
    document.getElementById("saveDRBtn").onclick = async () => {
      const data = { type: currentDRSubTab, date: document.getElementById("drDate").value, customer: document.getElementById("drCustomer").value, brand: document.getElementById("drBrand").value, model: document.getElementById("drModel").value, serial: document.getElementById("drSerial").value, jobDescription: document.getElementById("drJobDesc").value, details: document.getElementById("drDetails").value, drReleasedTo: document.getElementById("drReleasedTo").value, drReturnedTo: document.getElementById("drReturnedTo").value, remarks: document.getElementById("drRemarks").value, completionDate: document.getElementById("drCompletionDate").value, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
      if(record) await db.collection("dr_sales_orders").doc(record.id).update(data);
      else await db.collection("dr_sales_orders").add(data);
      modal.remove();
      renderDRSubTab();
    };
  }
  async function importDRCSV() {
    const file = document.getElementById("drCsvFile").files[0];
    if(!file) return alert("Select CSV");
    const reader = new FileReader();
    reader.onload = async e => {
      const lines = e.target.result.split(/\r?\n/);
      if(lines.length<2) return alert("CSV empty");
      let success=0, fail=0;
      for(let i=1;i<lines.length;i++) {
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(",").map(c=>c.trim().replace(/^"|"$/g,''));
        if(cols.length<11) continue;
        const record = { type: currentDRSubTab, date: toISODate(cols[0]), customer: cols[1]||"", brand: cols[2]||"", model: cols[3]||"", serial: cols[4]||"", jobDescription: cols[5]||"", details: cols[6]||"", drReleasedTo: cols[7]||"", drReturnedTo: cols[8]||"", remarks: cols[9]||"", completionDate: toISODate(cols[10]), timestamp: firebase.firestore.FieldValue.serverTimestamp() };
        try { await db.collection("dr_sales_orders").add(record); success++; } catch(e) { fail++; }
      }
      alert(`Imported ${success} records, ${fail} failed.`);
      document.getElementById("drCsvFile").value = "";
      renderDRSubTab();
    };
    reader.readAsText(file);
  }
  function exportDRCSV() {
    const records = allDRRecords.filter(r=>r.type===currentDRSubTab && r.date && r.date.slice(0,7)===currentMonthFilter);
    const headers = ["DATE","CUSTOMER","BRAND","MODEL","SERIAL","JOB DESCRIPTION","DETAILS","DR-RELEASED TO","DR-RETURN TO","REMARKS","COMPLETION DATE"];
    const rows = records.map(r=>[toDisplayDate(r.date), r.customer, r.brand, r.model, r.serial, r.jobDescription, r.details, r.drReleasedTo, r.drReturnedTo, r.remarks, toDisplayDate(r.completionDate)]);
    const csv = [headers, ...rows].map(row=>row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv],{type:"text/csv"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`${currentDRSubTab}_${currentMonthFilter}.csv`; a.click();
  }

  document.getElementById("quickReportBtn").onclick = () => {
    const totalVal = allInventory.reduce((s,i)=>s+(i.qty*(i.price||0)),0);
    const low = allInventory.filter(p=>p.qty<=p.threshold && p.qty>0).length;
    alert(`QUICK REPORT\nTotal Units: ${allInventory.reduce((s,i)=>s+i.qty,0)}\nLow Stock Items: ${low}\nTotal Value: ₱${totalVal.toLocaleString()}`);
  };
</script>
