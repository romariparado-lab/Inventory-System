<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EQUIPRIME INVENTORY PRO</title>
  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDKs (compat version) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fefefe;
      color: #002a54;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .dashboard {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      width: 280px;
      background: #002a54;
      color: #fefefe;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
    }
    .sidebar .title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .sidebar .title h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .sidebar .title p {
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .nav-item {
      padding: 0.7rem 1rem;
      margin: 0.2rem 0;
      cursor: pointer;
      transition: all 0.2s;
      color: #fefefe;
      font-weight: 500;
      border-radius: 0.5rem;
    }
    .nav-item:hover, .nav-item.active {
      background: #1e4a76;
    }
    .network-status {
      margin-top: auto;
      padding: 1rem 0.5rem;
      font-size: 0.75rem;
      text-align: center;
      border-top: 1px solid #3b6e9e;
    }
    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 6px;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fefefe;
      overflow: auto;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #fefefe;
      border-bottom: 1px solid #acaa93;
      flex-shrink: 0;
    }
    .btn-sm {
      background: #acaa93;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      color: #002a54;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      margin-left: 0.75rem;
    }
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
    }
    .stat-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #5a6e8a;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0.25rem 0;
    }
    .stat-sub {
      font-size: 0.7rem;
      color: #5a6e8a;
    }
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-card, .alerts-card {
      background: #fefefe;
      border: 1px solid #acaa93;
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .form-card h3, .alerts-card h3 {
      margin-bottom: 1rem;
      font-size: 1rem;
      border-left: 3px solid #002a54;
      padding-left: 0.5rem;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .form-row label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    .form-row input, .form-row select {
      padding: 0.5rem;
      border: 1px solid #acaa93;
      border-radius: 0.5rem;
      background: #fefefe;
      font-family: 'Poppins', sans-serif;
    }
    .btn-primary {
      background: #002a54;
      color: #fefefe;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      font-family: 'Poppins', sans-serif;
    }
    .alert-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
      font-size: 0.85rem;
    }
    .supplier-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #acaa93;
    }
    .supplier-name {
      font-weight: 600;
    }
    .reliability {
      font-size: 0.7rem;
      color: #5a6e8a;
    }
    .badge {
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .branch-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .branch-btn {
      background: #acaa93;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #002a54;
      font-family: 'Poppins', sans-serif;
    }
    .branch-active {
      background: #002a54;
      color: #fefefe;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .data-table th, .data-table td {
      padding: 0.6rem;
      text-align: left;
      border-bottom: 1px solid #acaa93;
      font-family: 'Poppins', sans-serif;
    }
    .data-table th {
      background: #f5f3ea;
      font-weight: 600;
    }
    .flex { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .login-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background:#002a54; display:flex; align-items:center; justify-content:center; z-index:2000;
    }
    .login-card {
      background: #fefefe; padding: 2rem; border-radius: 1rem; width: 320px; border: 1px solid #acaa93;
    }
    input, select {
      background: #fefefe; border: 1px solid #acaa93; padding: 0.5rem; border-radius: 0.5rem; color: #002a54;
      font-family: 'Poppins', sans-serif;
    }
    button { cursor: pointer; }
    .modal {
      position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000;
    }
    .modal-content {
      background: #fefefe; padding: 1.5rem; border-radius: 1rem; width: 400px; max-width: 90%; border: 1px solid #acaa93;
    }
    .sub-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #acaa93;
    }
    .sub-tab-btn {
      background: none;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      color: #5a6e8a;
      font-family: 'Poppins', sans-serif;
    }
    .sub-tab-btn.active {
      color: #002a54;
      border-bottom: 2px solid #002a54;
    }
  </style>
</head>
<body>
<div id="loginContainer" class="login-overlay">
  <div class="login-card">
    <h2>EQUIPRIME PRO</h2>
    <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom:0.5rem;"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button id="loginBtn" class="btn-primary" style="margin-top:1rem; width:100%;">Login</button>
    <button id="signupBtn" style="margin-top:0.5rem; width:100%; background:#acaa93; border:none; padding:0.5rem; border-radius:0.5rem; color:#002a54;">Sign Up</button>
  </div>
</div>

<div id="appContainer" style="display:none; height:100vh; display:flex; flex-direction:column;">
<div class="dashboard">
  <div class="sidebar">
    <div class="title">
      <h1>EQUIPRIME</h1>
      <p>INVENTORY PRO</p>
    </div>
    <div class="nav-menu" id="navMenu"></div>
    <div class="network-status">
      <div><span class="status-led"></span> NETWORK STATUS: WAREHOUSE SYNC LIVE</div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <button id="quickReportBtn" class="btn-sm">Quick Report</button>
      <button id="logoutBtn" class="btn-sm">Logout</button>
    </div>
    <div class="content-scroll" id="dynamicContent"></div>
  </div>
</div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCkoNkDgW9uDAZ6wcTHgzJ7__ik3NsmStc",
    authDomain: "eos-inventory.firebaseapp.com",
    projectId: "eos-inventory",
    storageBucket: "eos-inventory.firebasestorage.app",
    messagingSenderId: "659110549779",
    appId: "1:659110549779:web:0cf5632cfc3319e46da2e6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // ========== ROLE-BASED ACCESS CONTROL ==========
  const USER_TAB_PERMISSIONS = {
    "adminrom@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "admindex@equiprime.ph": ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"],
    "adminkim@equiprime.ph": ["parts", "kpi", "movement", "uploads"],
    "GMCarlo@equiprime.ph": ["machines"],
    "Sales.Machines@equiprime.ph": ["machines"],
    "admincris@equiprime.ph": ["machines"],
    "admin.andy@equiprime.ph": ["dr_sales"]
  };
  const DEFAULT_VIEWS = ["parts"];
  const ALL_VIEWS = ["parts", "machines", "suppliers", "kpi", "movement", "uploads", "backup", "dr_sales"];
  const VIEW_DISPLAY_NAMES = {
    parts: "Parts Inventory",
    machines: "Machines Log",
    suppliers: "Supplier Tracking",
    kpi: "KPI Reports",
    movement: "Slow/Fast Moving",
    uploads: "Parts Uploads",
    backup: "Backup / Restore",
    dr_sales: "Delivery Receipt & Sales Order"
  };

  let currentUser = null;
  let allowedViews = [];
  let allInventory = [], allMachines = [], allTransactions = [], allUploads = [], allDRRecords = [];
  let unsubInv, unsubMach, unsubTx, unsubUp, unsubDR;
  let currentBranch = "main";
  let branchUnsub = null;
  let currentView = "parts";
  let currentDRSubTab = "north_luzon_pms";

  // Login / Logout
  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("loginEmail").value;
    const pwd = document.getElementById("loginPassword").value;
    auth.signInWithEmailAndPassword(email, pwd).catch(e => alert("Login error: "+e.message));
  };
  document.getElementById("signupBtn").onclick = () => {
    const email = document.getElementById("loginEmail").value;
    const pwd = document.getElementById("loginPassword").value;
    auth.createUserWithEmailAndPassword(email, pwd).catch(e => alert("Signup error: "+e.message));
  };
  document.getElementById("logoutBtn").onclick = () => auth.signOut();

  auth.onAuthStateChanged(user => {
    if(user) {
      currentUser = user;
      const email = user.email;
      allowedViews = USER_TAB_PERMISSIONS[email] || DEFAULT_VIEWS;
      console.log("Logged in as:", email, "Allowed views:", allowedViews);
      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display = "flex";
      buildNavigation();
      startGlobalListeners();
      if (allowedViews.length > 0) {
        loadView(allowedViews[0]);
      } else {
        alert("You have no access to any module. Contact admin.");
      }
    } else {
      document.getElementById("loginContainer").style.display = "flex";
      document.getElementById("appContainer").style.display = "none";
      if(unsubInv) unsubInv(); if(unsubMach) unsubMach(); if(unsubTx) unsubTx(); if(unsubUp) unsubUp(); if(unsubDR) unsubDR();
      if(branchUnsub) branchUnsub();
    }
  });

  function buildNavigation() {
    const navMenu = document.getElementById("navMenu");
    navMenu.innerHTML = "";
    for (const view of ALL_VIEWS) {
      if (allowedViews.includes(view)) {
        const navItem = document.createElement("div");
        navItem.className = "nav-item";
        if (view === currentView) navItem.classList.add("active");
        navItem.textContent = VIEW_DISPLAY_NAMES[view];
        navItem.setAttribute("data-view", view);
        navItem.onclick = () => {
          loadView(view);
          document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
          navItem.classList.add("active");
        };
        navMenu.appendChild(navItem);
      }
    }
  }

  function startGlobalListeners() {
    unsubInv = db.collection("inventory").onSnapshot(snapshot => {
      allInventory = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "parts") renderPartsView();
      if (currentView === "movement") renderMovementView();
      updateDashboardStats();
      renderRestockAlerts();
    });
    unsubMach = db.collection("machines").onSnapshot(snapshot => {
      allMachines = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "machines") renderMachinesView();
      updateDashboardStats();
    });
    unsubTx = db.collection("transactions").onSnapshot(snapshot => {
      allTransactions = snapshot.docs.map(d => d.data());
      if (currentView === "movement") renderMovementView();
    });
    unsubUp = db.collection("uploads").onSnapshot(snapshot => {
      allUploads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "uploads") renderUploadsView();
    });
    unsubDR = db.collection("dr_sales_orders").onSnapshot(snapshot => {
      allDRRecords = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === "dr_sales") renderDRView();
    });
  }

  function updateDashboardStats() {
    const totalUnits = allInventory.reduce((s,i)=>s + (i.qty||0),0);
    const lowStockCount = allInventory.filter(i => i.qty <= i.threshold && i.qty>0).length;
    const totalValue = allInventory.reduce((s,i)=>s + (i.qty * (i.price||0)),0);
    const availableMachines = allMachines.filter(m => m.status === "AVAILABLE").length;
    const totalMachines = allMachines.length;
    const efficiency = totalMachines ? (availableMachines/totalMachines)*100 : 100;
    const statDivs = document.querySelectorAll(".stat-value");
    if(statDivs.length) {
      statDivs[0].innerText = totalUnits;
      statDivs[1].innerText = lowStockCount;
      statDivs[2].innerHTML = `₱${totalValue.toLocaleString()}`;
      statDivs[3].innerText = `${Math.round(efficiency)}%`;
    }
  }

  function renderRestockAlerts() {
    const lowStockParts = allInventory.filter(i => i.qty <= i.threshold && i.qty>0).slice(0,5);
    const container = document.getElementById("restockAlertsContainer");
    if(container) {
      container.innerHTML = lowStockParts.map(p => `<div class="alert-item">⚠️ RESTOCK REMINDER: ${p.name} (${p.qty} left, min ${p.threshold})</div>`).join("") || "<div class='alert-item'>✅ All stock levels normal</div>";
    }
  }

  function loadView(view) {
    currentView = view;
    if (view === "parts") renderPartsView();
    else if (view === "machines") renderMachinesView();
    else if (view === "suppliers") renderSuppliersView();
    else if (view === "kpi") renderKPIView();
    else if (view === "movement") renderMovementView();
    else if (view === "uploads") renderUploadsView();
    else if (view === "backup") renderBackupView();
    else if (view === "dr_sales") renderDRView();
  }

  // ========== PARTS INVENTORY VIEW (fully functional) ==========
  async function renderPartsView() {
    const container = document.getElementById("dynamicContent");
    container.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-title">TOTAL UNITS</div><div class="stat-value" id="statTotalUnits">0</div></div>
        <div class="stat-card"><div class="stat-title">LOW STOCK WARNING</div><div class="stat-value" id="statLowStock">0</div><div class="stat-sub">ACTION REQUIRED</div></div>
        <div class="stat-card"><div class="stat-title">MANAGED VALUE</div><div class="stat-value" id="statValue">₱0</div><div class="stat-sub">PHP EQUIV.</div></div>
        <div class="stat-card"><div class="stat-title">ASSET EFFICIENCY</div><div class="stat-value" id="statEfficiency">100%</div><div class="stat-sub">FLEET AVAILABILITY</div></div>
      </div>
      <div class="two-columns">
        <div class="form-card">
          <h3>ADD ASSET ENTRY</h3>
          <div class="form-row"><label>Part Number *</label><input id="newPartNo" placeholder="Part Number"></div>
          <div class="form-row"><label>Part Name *</label><input id="newPartName" placeholder="Part Name"></div>
          <div class="form-row"><label>Category</label><select id="newCategory"><option>Kobelco Parts</option><option>Shantui Parts</option><option>Sakai Parts</option><option>Trime Parts</option><option>Non-Core Products</option></select></div>
          <div class="form-row"><label>Quantity</label><input id="newQty" type="number" value="0"></div>
          <div class="form-row"><label>Price (₱)</label><input id="newPrice" type="number" step="0.01" value="0.00"></div>
          <div class="form-row"><label>Low Stock Threshold</label><input id="newThreshold" type="number" value="5"></div>
          <button id="addPartBtn" class="btn-primary">COMMIT ENTRY</button>
          <div id="addError" style="color:#b91c1c; font-size:0.8rem; margin-top:0.5rem;"></div>
        </div>
        <div class="alerts-card">
          <h3>RESTOCK ALERT</h3>
          <div id="restockAlertsContainer">Loading...</div>
          <hr style="margin:1rem 0; border-color:#acaa93;">
          <h3>ACTIVE SUPPLIERS</h3>
          <div class="supplier-item"><span class="supplier-name">SHANTUI</span><div class="reliability">Machines & Parts</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">SAKAI</span><div class="reliability">Compaction Equipment</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">TRIME</span><div class="reliability">Lighting Towers</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">BHI</span><div class="reliability">Breakers & Attachments</div><span class="badge badge-green">ACTIVE</span></div>
          <div class="supplier-item"><span class="supplier-name">KD HAMMERS</span><div class="reliability">Hydraulic Hammers</div><span class="badge badge-green">ACTIVE</span></div>
        </div>
      </div>
      <div class="branch-tabs" id="branchTabs"></div>
      <div style="background:#fefefe; border:1px solid #acaa93; border-radius:0.75rem; padding:1rem; margin-top:1rem;">
        <h3>ASSET WAREHOUSE REGISTRY</h3>
        <div id="branchInventoryPanel"></div>
      </div>
    `;
    const branches = ["main","homonhon","coda","northluzon"];
    const branchNames = { main:"Main Warehouse", homonhon:"Homonhon", coda:"CODA", northluzon:"North Luzon" };
    const tabsDiv = document.getElementById("branchTabs");
    tabsDiv.innerHTML = branches.map(b => `<div class="branch-btn ${b===currentBranch?'branch-active':''}" data-branch="${b}">${branchNames[b]}</div>`).join("");
    document.querySelectorAll(".branch-btn").forEach(btn => {
      btn.onclick = () => {
        currentBranch = btn.getAttribute("data-branch");
        loadBranchInventory();
        document.querySelectorAll(".branch-btn").forEach(b => b.classList.remove("branch-active"));
        btn.classList.add("branch-active");
      };
    });
    await loadBranchInventory();
    updateDashboardStats();
    renderRestockAlerts();
    document.getElementById("addPartBtn").onclick = addPartToBranch;
  }

  async function loadBranchInventory() {
    const container = document.getElementById("branchInventoryPanel");
    if(!container) return;
    const snapshot = await db.collection("inventory").where("branch","==",currentBranch).get();
    const branchItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    container.innerHTML = `
      <div style="margin-top:0.5rem;">
        <div class="flex" style="justify-content:space-between; margin-bottom:1rem;">
          <div></div>
          <div>
            <input type="file" id="csvImportFile" accept=".csv" style="width:auto; display:inline;">
            <label><input type="checkbox" id="overwriteCheckbox"> Clear existing</label>
            <button id="importCsvBtn" class="btn-sm">Import CSV</button>
          </div>
        </div>
        <div class="overflow-auto"><table class="data-table"><thead><th>Part#</th><th>Name</th><th>Qty</th><th>Price</th><th>Threshold</th><th>Status</th><th>Actions</th></thead><tbody id="branchTbody"></tbody></table></div>
      </div>
    `;
    const tbody = document.getElementById("branchTbody");
    tbody.innerHTML = "";
    branchItems.forEach(item => {
      const status = item.qty==0?"Out":(item.qty<=item.threshold?"Low":"In");
      let badge = status==="In"?"<span class='badge badge-green'>In Stock</span>":(status==="Low"?"<span class='badge badge-orange'>Low Stock</span>":"<span class='badge badge-red'>Out</span>");
      const row = tbody.insertRow();
      row.insertCell(0).innerText = item.partNo;
      row.insertCell(1).innerText = item.name;
      row.insertCell(2).innerHTML = `<div class="flex"><button class="decQty" data-id="${item.id}">−</button>${item.qty}<button class="incQty" data-id="${item.id}">+</button></div>`;
      row.insertCell(3).innerText = "₱"+(item.price||0).toFixed(2);
      row.insertCell(4).innerText = item.threshold;
      row.insertCell(5).innerHTML = badge;
      let actions = `<button class="editThresh" data-id="${item.id}">✏️</button>`;
      if (allowedViews.includes("parts") && (currentUser.email === "adminrom@equiprime.ph" || currentUser.email === "admindex@equiprime.ph")) {
        actions += ` <button class="deletePart" data-id="${item.id}">🗑️</button>`;
      }
      row.insertCell(6).innerHTML = actions;
    });
    document.querySelectorAll(".incQty").forEach(btn => btn.onclick = () => modifyQty(btn.dataset.id, 1));
    document.querySelectorAll(".decQty").forEach(btn => btn.onclick = () => modifyQty(btn.dataset.id, -1));
    if (currentUser && (currentUser.email === "adminrom@equiprime.ph" || currentUser.email === "admindex@equiprime.ph")) {

  async function modifyQty(id, delta) {
    const doc = await db.collection("inventory").doc(id).get();
    if(!doc.exists) return;
    let newQty = doc.data().qty + delta;
    if(newQty<0) newQty=0;
    const change = newQty - doc.data().qty;
    if(change===0) return;
    await db.collection("inventory").doc(id).update({ qty: newQty });
    await db.collection("transactions").add({
      productId: id, partNo: doc.data().partNo, productName: doc.data().name,
      branch: currentBranch, type: change>0?"in":"out", quantity: Math.abs(change),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  async function editThreshold(id) {
    let newTh = prompt("New low stock threshold:");
    if(newTh && !isNaN(parseInt(newTh))) await db.collection("inventory").doc(id).update({ threshold: parseInt(newTh) });
  }
  async function addPartToBranch() {
    const partNo = document.getElementById("newPartNo").value.trim();
    const name = document.getElementById("newPartName").value.trim();
    if(!partNo || !name) {
      document.getElementById("addError").innerText = "Part Number and Name required";

    const qty = parseInt(document.getElementById("newQty").value)||0;
    const price = parseFloat(document.getElementById("newPrice").value)||0;

    await db.collection("inventory").add({ partNo, name, branch: currentBranch, qty, price, threshold });
    if(qty>0) await db.collection("transactions").add({ productId: "new", partNo, productName: name, branch: currentBranch, type: "in", quantity: qty, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    document.getElementById("newPartNo").value = "";

  async function importCSVToBranch(branch) {
    const file = document.getElementById("csvImportFile").files[0];
    if(!file) return alert("Select CSV file");
    const overwrite = document.getElementById("overwriteCheckbox").checked;
    if(overwrite && !confirm("Clear all parts in this branch?")) return;
    if(overwrite) {
      const snap = await db.collection("inventory").where("branch","==",branch).get();
      const batch = db.batch();
      snap.forEach(doc => batch.delete(doc.ref));
      await batch.commit();
    }
    const reader = new FileReader();
    reader.onload = async(e) => {
      const lines = e.target.result.split(/\r?\n/);
      const headers = lines[0].split(",").map(h=>h.trim().toLowerCase());
      const idx = { partNumber: headers.indexOf("partnumber"), partName: headers.indexOf("partname"), category: headers.indexOf("category"), quantity: headers.indexOf("quantity"), price: headers.indexOf("price"), threshold: headers.indexOf("threshold") };
      let success=0, fail=0;
      for(let i=1;i<lines.length;i++) {
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(",").map(c=>c.trim().replace(/^"|"$/g,''));
        const partNo = cols[idx.partNumber];
        const name = cols[idx.partName];
        if(!partNo || !name) { fail++; continue; }
        const category = (idx.category>=0 && cols[idx.category]) ? cols[idx.category] : "Non-Core Products";
        let qty = parseInt((idx.quantity>=0 ? cols[idx.quantity] : 0)) || 0;
        let price = parseFloat((idx.price>=0 ? cols[idx.price] : 0)) || 0;
        let threshold = parseInt((idx.threshold>=0 ? cols[idx.threshold] : 5)) || 5;
        await db.collection("inventory").add({ partNo, name, category, branch, qty, price, threshold });
        success++;
      }
      alert(`Imported ${success} parts, ${fail} failed.`);
      loadBranchInventory();
    };
    reader.readAsText(file);
  }

          if(tx.type === "in") { inTotal += tx.quantity; prodIn[tx.productName] = (prodIn[tx.productName]||0) + tx.quantity; }
          else { outTotal += tx.quantity; prodOut[tx.productName] = (prodOut[tx.productName]||0) + tx.quantity; }
        }
      });
      const topIn = Object.entries(prodIn).sort((a,b)=>b[1]-a[1])[0] || ["None",0];
      const topOut = Object.entries(prodOut).sort((a,b)=>b[1]-a[1])[0] || ["None",0];
      const csvRows = [
        ["Metric","Value"],
        [`Period (last ${months} months)`,""],
        ["Total IN (units)", inTotal],
        ["Total OUT (units)", outTotal],
        ["Net Change", inTotal-outTotal],
        ["Top IN Product", `${topIn[0]} (${topIn[1]})`],
        ["Top OUT Product", `${topOut[0]} (${topOut[1]})`]
      ];
      const csv = csvRows.map(r => r.join(",")).join("\n");

  function updateFastMovingAndMovement() {
    const threeMonthsAgo = new Date(); threeMonthsAgo.setMonth(threeMonthsAgo.getMonth()-3);
    const consumption = {};
    allTransactions.forEach(tx => {
      if(tx.type === "out" && tx.timestamp && new Date(tx.timestamp) >= threeMonthsAgo) {
        consumption[tx.productId] = (consumption[tx.productId]||0) + tx.quantity;
      }
    });
    const partsWithOut = allInventory.map(item => ({ ...item, outQty: consumption[item.id] || 0 }));
    const fastMoving = [...partsWithOut].sort((a,b)=>b.outQty - a.outQty).slice(0,5);
    const fastHtml = fastMoving.length ? "<table class='data-table'><thead><th>Part#</th><th>Name</th><th>OUT (3mo)</th></thead><tbody>" + fastMoving.map(p => `<tr><td>${p.partNo}</td><td>${p.name}</td><td>${p.outQty}</td></tr>`).join("") + "</tbody></table>" : "<p>No movement data yet.</p>";
    document.getElementById("fastMovingList").innerHTML = fastHtml;
    let fullHtml = "<table class='data-table'><thead><th>Part#</th><th>Name</th><th>OUT (3mo)</th><th>Classification</th></thead><tbody>";
    partsWithOut.forEach(item => {
      let classification = "NORMAL";
      if(item.outQty === 0) classification = "SLOW (no movement)";
      else if(item.outQty < 5) classification = "SLOW";
      else classification = "FAST MOVING";
      fullHtml += `<tr><td>${item.partNo}</td><td>${item.name}</td><td>${item.outQty}</td><td><strong>${classification}</strong></td></tr>`;
    });
    fullHtml += "</tbody></table>";
    document.getElementById("movementTable").innerHTML = fullHtml;
  }

    const partId = document.getElementById("outPartSelect").value;

    if(!partId || !qty || !file) return alert("Select part, qty, file");

    if(item.qty < qty) return alert("Not enough stock");

    const fileDataURL = await readFileAsDataURL(file);

    await db.collection("transactions").add({ productId: partId, partNo: item.partNo, productName: item.name, type: "out", quantity: qty, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    alert("OUT recorded");

      row.insertCell(3).innerText = record.model || "";
      row.insertCell(4).innerText = record.serial || "";
      row.insertCell(5).innerText = record.jobDescription || "";
      row.insertCell(6).innerText = record.details || "";
      row.insertCell(7).innerText = record.drReleasedTo || "";
      row.insertCell(8).innerText = record.drReturnedTo || "";
      row.insertCell(9).innerText = record.remarks || "";
      row.insertCell(10).innerText = record.completionDate || "";
      const actions = `<button class="deleteDRRecord" data-id="${record.id}">🗑️</button>`;
      row.insertCell(11).innerHTML = actions;
    });
    document.querySelectorAll(".deleteDRRecord").forEach(btn => btn.onclick = () => {
      if(confirm("Delete this record?")) db.collection("dr_sales_orders").doc(btn.dataset.id).delete();
    });
    document.getElementById("addDRRecordBtn").onclick = () => openDRModal();
    document.getElementById("importDRCsvBtn").onclick = () => importDRCSV();
    document.getElementById("exportDRCsvBtn").onclick = () => exportDRCSV();
    document.getElementById("deleteAllDRBtn").onclick = () => {
      if(confirm(`⚠️ This will delete ALL records in "${currentDRSubTab === 'north_luzon_pms' ? 'North Luzon PMS' : 'Monitoring of DR'}". Are you sure?`)) {
        deleteAllDRRecords();
      }
    };
  }

  function openDRModal(record = null) {
    const modal = document.createElement("div"); modal.className = "modal";
    modal.innerHTML = `
      <div class="modal-content">
        <h3>${record ? 'Edit Record' : 'Add New Record'}</h3>
        <div class="form-row"><label>Date</label><input type="date" id="drDate" value="${record?.date || ''}"></div>
        <div class="form-row"><label>Customer</label><input id="drCustomer" value="${record?.customer || ''}"></div>
        <div class="form-row"><label>Brand</label><input id="drBrand" value="${record?.brand || ''}"></div>
        <div class="form-row"><label>Model</label><input id="drModel" value="${record?.model || ''}"></div>
        <div class="form-row"><label>Serial</label><input id="drSerial" value="${record?.serial || ''}"></div>
        <div class="form-row"><label>Job Description</label><input id="drJobDesc" value="${record?.jobDescription || ''}"></div>
        <div class="form-row"><label>Details</label><input id="drDetails" value="${record?.details || ''}"></div>
        <div class="form-row"><label>DR-Released to</label><input id="drReleasedTo" value="${record?.drReleasedTo || ''}"></div>
        <div class="form-row"><label>DR-Returned to</label><input id="drReturnedTo" value="${record?.drReturnedTo || ''}"></div>
        <div class="form-row"><label>Remarks/Status</label><input id="drRemarks" value="${record?.remarks || ''}"></div>
        <div class="form-row"><label>Completion Date</label><input type="date" id="drCompletionDate" value="${record?.completionDate || ''}"></div>
        <div class="flex" style="margin-top:1rem;">
          <button id="saveDRModalBtn" class="btn-primary">Save</button>
          <button id="cancelDRModalBtn" class="btn-sm">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById("cancelDRModalBtn").onclick = () => modal.remove();
    document.getElementById("saveDRModalBtn").onclick = async () => {
      const data = {
        type: currentDRSubTab,
        date: document.getElementById("drDate").value,
        customer: document.getElementById("drCustomer").value,
        brand: document.getElementById("drBrand").value,
        model: document.getElementById("drModel").value,
        serial: document.getElementById("drSerial").value,
        jobDescription: document.getElementById("drJobDesc").value,
        details: document.getElementById("drDetails").value,
        drReleasedTo: document.getElementById("drReleasedTo").value,
        drReturnedTo: document.getElementById("drReturnedTo").value,
        remarks: document.getElementById("drRemarks").value,
        completionDate: document.getElementById("drCompletionDate").value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (record) {
        await db.collection("dr_sales_orders").doc(record.id).update(data);
      } else {
        await db.collection("dr_sales_orders").add(data);
      }
      modal.remove();
    };
  }

  async function importDRCSV() {
    const file = document.getElementById("drCsvFile").files[0];
    if (!file) return alert("Select a CSV file");
    const reader = new FileReader();
    reader.onload = async (e) => {
      const lines = e.target.result.split(/\r?\n/);
      if (lines.length < 2) return alert("CSV file empty");
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
      const idx = {
        date: headers.indexOf("date"),
        customer: headers.indexOf("customer"),
        brand: headers.indexOf("brand"),
        model: headers.indexOf("model"),
        serial: headers.indexOf("serial"),
        jobDescription: headers.indexOf("job description"),
        details: headers.indexOf("details"),
        drReleasedTo: headers.indexOf("dr-released to"),
        drReturnedTo: headers.indexOf("dr-returned to"),
        remarks: headers.indexOf("remarks/status"),
        completionDate: headers.indexOf("completion date")
      };
      let success = 0, fail = 0;
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = lines[i].split(",").map(c => c.trim().replace(/^"|"$/g, ''));
        const record = {
          type: currentDRSubTab,
          date: cols[idx.date] || "",
          customer: cols[idx.customer] || "",
          brand: cols[idx.brand] || "",
          model: cols[idx.model] || "",
          serial: cols[idx.serial] || "",
          jobDescription: cols[idx.jobDescription] || "",
          details: cols[idx.details] || "",
          drReleasedTo: cols[idx.drReleasedTo] || "",
          drReturnedTo: cols[idx.drReturnedTo] || "",
          remarks: cols[idx.remarks] || "",
          completionDate: cols[idx.completionDate] || "",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
          await db.collection("dr_sales_orders").add(record);
          success++;
        } catch(e) { fail++; }
      }
      alert(`Imported ${success} records, ${fail} failed.`);
      document.getElementById("drCsvFile").value = "";
    };
    reader.readAsText(file);
  }

  function exportDRCSV() {
    const records = allDRRecords.filter(r => r.type === currentDRSubTab);
    const headers = ["Date","Customer","Brand","Model","Serial","Job Description","Details","DR-Released to","DR-Returned to","Remarks/Status","Completion Date"];
    const rows = records.map(r => [
      r.date, r.customer, r.brand, r.model, r.serial, r.jobDescription, r.details,
      r.drReleasedTo, r.drReturnedTo, r.remarks, r.completionDate
    ]);
    const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${currentDRSubTab}.csv`; a.click();
  }

  // Quick report
  document.getElementById("quickReportBtn").onclick = () => {
    const totalVal = allInventory.reduce((s,i)=>s+(i.qty*(i.price||0)),0);
    const lowStock = allInventory.filter(p=>p.qty<=p.threshold && p.qty>0).length;
    alert(`QUICK REPORT\nTotal Units: ${allInventory.reduce((s,i)=>s+i.qty,0)}\nLow Stock Items: ${lowStock}\nTotal Value: ₱${totalVal.toLocaleString()}`);
  };
</script>
</body>
